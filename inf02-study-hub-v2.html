{id:63,a:"O",q:"Tryb awaryjny (Safe Mode) w Windows uruchamia system:",o:["Z pełną grafiką","Z minimalnym zestawem sterowników","Bez RAM","Bez procesora"],c:1,e:"Safe Mode ładuje tylko niezbędne sterowniki — pomocny przy diagnostyce konfliktów/malware."},
{id:64,a:"O",q:"Polecenie 'whoami' w Linuxie/Windows wyświetla:",o:["Wersję systemu","Bieżącego zalogowanego użytkownika","Listę procesów","Adres IP"],c:1,e:"whoami zwraca login bieżącego użytkownika (UID w Linuxie, NAZWA w Windows)."},
{id:65,a:"O",q:"Repozytorium pakietów w Linuxie to:",o:["Folder z plikami użytkownika","Serwer/lokalizacja udostępniająca pakiety oprogramowania","Backup systemu","Sterownik karty sieciowej"],c:1,e:"Repozytoria APT/YUM/Pacman zawierają paczki .deb/.rpm/.pkg do instalacji przez menedżer pakietów."},

// --- SIECI KOMPUTEROWE (N) ---
{id:66,a:"N",q:"Maska podsieci /24 odpowiada zapisowi dziesiętnemu:",o:["255.255.0.0","255.255.255.0","255.255.255.128","255.255.255.255"],c:1,e:"/24 = 24 jedynki = 11111111.11111111.11111111.00000000 = 255.255.255.0."},
{id:67,a:"N",q:"Adres IP 192.168.5.165 z maską /26 należy do podsieci:",o:["192.168.5.0/26","192.168.5.64/26","192.168.5.128/26","192.168.5.192/26"],c:2,e:"Maska /26 daje bloki po 2^(32-26)=64 adresy. Adres podsieci wyznaczamy ze wzoru: (oktet hosta div rozmiar bloku) × rozmiar bloku. Tu: 165 div 64 = 2, 2 × 64 = 128, więc adres podsieci to 192.168.5.128/26 (zakres 128–191)."},
{id:68,a:"N",q:"Aby z sieci 192.168.1.0/24 utworzyć 8 podsieci, należy zastosować maskę:",o:["/25","/26","/27","/28"],c:2,e:"8 = 2^3 → trzy dodatkowe bity → /24+3 = /27 (255.255.255.224, po 32 adresy)."},
{id:69,a:"N",q:"Adres broadcast w sieci 192.168.0.0/24 to:",o:["192.168.0.0","192.168.0.1","192.168.0.254","192.168.0.255"],c:3,e:"Broadcast = ostatni adres w podsieci. Dla /24 (256 adresów) = .255."},
{id:70,a:"N",q:"Liczba dostępnych adresów hostów w sieci /28 wynosi:",o:["6","14","30","62"],c:1,e:"/28 = 16 adresów - 2 (sieć + broadcast) = 14 hostów."},
{id:71,a:"N",q:"Protokół DHCP odpowiada za:",o:["Tłumaczenie nazw na IP","Automatyczne przydzielanie adresów IP","Routing","Szyfrowanie ruchu"],c:1,e:"DHCP (Dynamic Host Configuration Protocol) automatyzuje przydział IP, maski, bramy, DNS klientom."},
{id:72,a:"N",q:"Protokół DNS działa zazwyczaj na porcie:",o:["21","53","80","443"],c:1,e:"DNS = port 53 (UDP/TCP). 21 = FTP, 80 = HTTP, 443 = HTTPS."},
{id:73,a:"N",q:"W modelu OSI warstwa 3 to:",o:["Łącza danych","Sieciowa","Transportowa","Aplikacji"],c:1,e:"OSI: 1-fizyczna, 2-łącza danych, 3-sieciowa (IP), 4-transportowa (TCP/UDP), 5-sesji, 6-prezentacji, 7-aplikacji."},
{id:74,a:"N",q:"Adres MAC ma długość:",o:["32 bity","48 bitów","64 bity","128 bitów"],c:1,e:"MAC = 48 bitów (6 oktetów), zwykle zapisywany jako 00:1A:2B:3C:4D:5E."},
{id:75,a:"N",q:"Kabel skrętki Cat 6 obsługuje przepustowość do:",o:["100 Mb/s","1 Gb/s","10 Gb/s na 55 m","40 Gb/s"],c:2,e:"Cat 6 = 1 Gb/s na 100 m, 10 Gb/s do ok. 55 m. Cat 6a = 10 Gb/s na 100 m."},
{id:76,a:"N",q:"Adres IPv6 ma długość:",o:["32 bity","64 bity","128 bitów","256 bitów"],c:2,e:"IPv6 = 128 bitów = 8 grup po 16 bitów (np. 2001:db8::1)."},
{id:77,a:"N",q:"NAT (Network Address Translation) służy do:",o:["Szyfrowania","Tłumaczenia adresów IP (zwykle prywatnych na publiczne)","Routingu wewnętrznego","Filtrowania pakietów"],c:1,e:"NAT pozwala wielu urządzeniom z prywatnymi IP komunikować się przez jeden publiczny."},
{id:78,a:"N",q:"Topologia gwiazdy charakteryzuje się tym, że:",o:["Wszystkie urządzenia połączone są w pętli","Każde urządzenie połączone jest do centralnego węzła (switcha)","Połączenie liniowe","Każdy z każdym"],c:1,e:"Gwiazda = wszystkie hosty łączą się do switcha/huba. Awaria centrum = awaria sieci."},
{id:79,a:"N",q:"Standard IEEE 802.11ac działa na pasmach:",o:["Tylko 2,4 GHz","Tylko 5 GHz","2,4 i 5 GHz","6 GHz"],c:1,e:"802.11ac (Wi-Fi 5) działa wyłącznie na 5 GHz. 802.11ax (Wi-Fi 6) — 2,4/5/6 GHz."},
{id:80,a:"N",q:"Polecenie 'tracert' w Windows służy do:",o:["Sprawdzenia ścieżki pakietów do celu","Skanowania portów","Konfiguracji DNS","Mapowania dysków sieciowych"],c:0,e:"tracert/traceroute pokazuje kolejne routery (hopki) na trasie do hosta docelowego."},
{id:81,a:"N",q:"Adres 169.254.x.x to adres:",o:["Publiczny","Lokalny APIPA (gdy DHCP nie działa)","Multicast","Loopback"],c:1,e:"APIPA = Automatic Private IP Addressing — host nadaje sobie adres z 169.254.0.0/16, gdy nie otrzyma IP z DHCP."},
{id:82,a:"N",q:"Switch działa na warstwie:",o:["1 (fizyczna)","2 (łącza danych)","3 (sieciowa)","7 (aplikacji)"],c:1,e:"Switch L2 podejmuje decyzje na podstawie MAC. Router — L3 (IP). Switch L3 łączy oba."},
{id:83,a:"N",q:"VLAN to:",o:["Wirtualna sieć LAN, segregacja ruchu na switchu","Sieć rozległa","Protokół szyfrowania","Adres bramy"],c:0,e:"VLAN (802.1Q) dzieli switch logicznie na osobne segmenty broadcast, niezależne od fizycznych portów."},
{id:84,a:"N",q:"Protokół TCP zapewnia:",o:["Komunikację bezpołączeniową","Komunikację połączeniową z potwierdzaniem","Brak nadawcy","Tylko broadcast"],c:1,e:"TCP — handshake, kolejność, retransmisje. UDP — bez potwierdzeń, szybszy."},
{id:85,a:"N",q:"Brama domyślna (default gateway) to:",o:["Adres serwera DNS","Adres routera dla pakietów spoza lokalnej sieci","Adres broadcast","Adres serwera plików"],c:1,e:"Gdy host wysyła pakiet poza lokalną podsieć, kieruje go do bramy domyślnej."},
{id:86,a:"N",q:"Sieć 10.0.0.0/8 to adresacja:",o:["Publiczna","Prywatna (klasa A)","Multicast","Loopback"],c:1,e:"Pula prywatna (RFC 1918): 10/8, 172.16-31/12, 192.168/16. Loopback = 127.0.0.0/8."},
{id:87,a:"N",q:"Maska 255.255.255.252 odpowiada prefiksowi:",o:["/28","/29","/30","/31"],c:2,e:"/30 = 30 jedynek = 255.255.255.252 → 4 adresy, 2 hosty (klasyczne łącza P2P)."},
{id:88,a:"N",q:"Protokół ARP służy do:",o:["Tłumaczenia IP → MAC w sieci lokalnej","Tłumaczenia nazw → IP","Routingu","Szyfrowania"],c:0,e:"ARP (Address Resolution Protocol) — mapuje adresy IP na MAC w warstwie 2."},
{id:89,a:"N",q:"Klasa C adresów IP obejmuje sieci:",o:["1.0.0.0 - 126.255.255.255","128.0.0.0 - 191.255.255.255","192.0.0.0 - 223.255.255.255","224.0.0.0 - 239.255.255.255"],c:2,e:"Klasy: A: 1-126, B: 128-191, C: 192-223, D: 224-239 (multicast), E: 240-255."},
{id:90,a:"N",q:"Standard PoE (Power over Ethernet) 802.3af dostarcza moc do:",o:["3 W","15,4 W","30 W","60 W"],c:1,e:"802.3af = ~15,4 W (PoE). 802.3at (PoE+) = 30 W. 802.3bt = 60-90 W."},
{id:91,a:"N",q:"Aby z sieci /24 wydzielić 4 podsieci równe, używamy maski:",o:["/25","/26","/27","/28"],c:1,e:"4 = 2^2 → +2 bity → /26 (255.255.255.192, po 64 adresy)."},
{id:92,a:"N",q:"Port 443 to standard dla:",o:["HTTP","HTTPS","FTP","SSH"],c:1,e:"HTTPS (HTTP over TLS) = 443. SSH = 22, HTTP = 80, FTP = 21."},
{id:93,a:"N",q:"WPA2 stosuje algorytm szyfrowania:",o:["DES","RC4","AES (CCMP)","MD5"],c:2,e:"WPA2 = AES w trybie CCMP (obowiązkowo). WPA = TKIP. WEP = RC4 (przestarzałe, niezalecane)."},
{id:94,a:"N",q:"Standard kabla światłowodowego SM (single-mode) charakteryzuje się:",o:["Większą odległością transmisji niż MM","Większą średnicą rdzenia","Krótszym zasięgiem","Wyższym tłumieniem"],c:0,e:"SM (rdzeń ~9 µm) — duże odległości (km), MM (50/62,5 µm) — krótsze, ale tańsze nadajniki."},
{id:95,a:"N",q:"Adres pętli zwrotnej w IPv4 to:",o:["0.0.0.0","127.0.0.1","255.255.255.255","192.168.1.1"],c:1,e:"127.0.0.1 (localhost) — wskazuje na ten sam komputer. W IPv6 = ::1."},
{id:96,a:"N",q:"VPN umożliwia:",o:["Tworzenie szyfrowanego tunelu przez sieć publiczną","Skanowanie portów","Tylko transmisję wideo","Tylko gier online"],c:0,e:"VPN (Virtual Private Network) tworzy zaszyfrowany tunel, np. dla zdalnej pracy."},
{id:97,a:"N",q:"Komenda 'nslookup nazwa.pl' służy do:",o:["Sprawdzania pingu","Odpytania serwera DNS o rekordy domeny","Konfigurowania interfejsu","Routingu"],c:1,e:"nslookup pyta DNS o A/AAAA/MX/etc. dla podanej domeny. Linux ma też 'dig'."},
{id:98,a:"N",q:"Protokół FTP w trybie pasywnym używa portów:",o:["20 do danych, 21 do kontroli","21 do kontroli, dynamiczne do danych (server →)","80 i 443","Tylko 21"],c:1,e:"FTP pasywne: kontrola na 21, dane na porcie wybranym przez serwer (>1023). Klient inicjuje połączenia."},
{id:99,a:"N",q:"DMZ (Demilitarized Zone) w sieci to:",o:["Strefa pełnego zaufania","Strefa wystawiona dla usług publicznych, oddzielona od LAN","Sieć bezprzewodowa","Backup"],c:1,e:"DMZ to wydzielona podsieć dla serwerów dostępnych z internetu (np. www, mail), oddzielona zaporą od LAN."},
{id:100,a:"N",q:"Maks. liczba hostów w sieci klasy /16 to:",o:["256","65 534","16 777 214","254"],c:1,e:"/16 = 65536 - 2 = 65534 hostów. Klasa B."},

// --- PERYFERIA / SPRZĘT SIECIOWY (P) ---
{id:101,a:"P",q:"Drukarka laserowa do utrwalenia tonera używa:",o:["Wody","Lasera","Wysokiej temperatury (zespół utrwalający - fuser)","Sprężonego powietrza"],c:2,e:"Toner topi się w fuserze (~180°C) i wnika w papier. Laser tylko naładowuje bęben."},
{id:102,a:"P",q:"Drukarka atramentowa najczęściej zatyka się przez:",o:["Brak papieru","Wyschnięcie tuszu w dyszach głowicy","Niskie napięcie","Brak tonera"],c:1,e:"Tusz wodny szybko wysycha; brak druku → należy uruchomić cykl czyszczenia głowicy."},
{id:103,a:"P",q:"Standard rozdzielczości drukarki wyrażany jest w:",o:["dpi (punktów na cal)","Hz","Mb/s","ppm"],c:0,e:"dpi = dots per inch — gęstość punktów. ppm = pages per minute (prędkość)."},
{id:104,a:"P",q:"Skaner CCD różni się od CIS tym, że:",o:["Jest tańszy","Ma większą głębię ostrości","Działa tylko w czerni","Jest ręczny"],c:1,e:"CCD ma układ optyczny + soczewki — większa głębia, ale grubszy. CIS — kompaktowy, mniejsza głębia."},
{id:105,a:"P",q:"Switch zarządzalny umożliwia:",o:["Tylko forwardowanie ramek","Konfigurację VLAN, QoS, port mirroring","Tylko routing","Druk sieciowy"],c:1,e:"Smart/zarządzalne switche oferują VLAN, port mirroring, QoS, link aggregation, SNMP, itp."},
{id:106,a:"P",q:"Access Point (AP) działa jako:",o:["Konwerter sygnału przewodowego na bezprzewodowy","Drukarka","Skaner","Pamięć masowa"],c:0,e:"AP łączy sieć przewodową ze stacjami Wi-Fi. Może działać samodzielnie lub w trybie kontrolera."},
{id:107,a:"P",q:"Router domowy zwykle pełni jednocześnie role:",o:["Tylko routera","Routera, switcha, AP, DHCP, NAT, firewall","Tylko switcha","Tylko AP"],c:1,e:"Tani router SOHO łączy w sobie kilka funkcji: trasowanie, lokalna sieć (switch), Wi-Fi, DHCP, NAT, prosta zapora."},
{id:108,a:"P",q:"Drukarka 3D typu FDM tworzy obiekty przez:",o:["Cięcie laserem","Nakładanie warstw stopionego filamentu","Rzeźbienie ręczne","Druk atramentowy"],c:1,e:"FDM (Fused Deposition Modeling) — głowica wytłacza stopiony plastik (PLA, ABS) warstwowo."},
{id:109,a:"P",q:"Multifunkcyjne urządzenie 4w1 łączy zwykle:",o:["Drukarkę, skaner, kserokopiarkę, fax","Tylko drukarkę i skaner","Komputer z monitorem","Router z modemem"],c:0,e:"Standardowy zestaw multifunkcji (MFP): druk, skan, kopia, fax. Niektóre modele bez fax = 3w1."},
{id:110,a:"P",q:"Klawiatura mechaniczna w przeciwieństwie do membranowej:",o:["Jest cichsza","Każdy klawisz ma osobny przełącznik (switch)","Jest gumowa","Nie ma podświetlenia"],c:1,e:"Mechaniczne switche (Cherry MX, Gateron) — wytrzymalsze, lepsza taktylność, droższe niż membrana."},
{id:111,a:"P",q:"Mysz optyczna używa:",o:["Kulki","Diody LED i czujnika obrazu","Mechaniki","Lasera medycznego"],c:1,e:"Optyczne myszy oświetlają powierzchnię diodą; sensor analizuje zmiany. Laserowe — laser zamiast LED."},
{id:112,a:"P",q:"Standard HDMI 2.1 obsługuje rozdzielczość:",o:["1080p@60Hz","4K@60Hz","4K@120Hz, 8K@60Hz","Tylko 720p"],c:2,e:"HDMI 2.1 (48 Gb/s) wspiera 4K@120Hz, 8K@60Hz, VRR, eARC."},
{id:113,a:"P",q:"Tablet graficzny komunikuje się z PC najczęściej przez:",o:["VGA","USB lub Bluetooth","HDMI","SATA"],c:1,e:"Tablety graficzne (Wacom, XP-Pen) łączą się przez USB lub bezprzewodowo (BT/dongle)."},
{id:114,a:"P",q:"Kontroler RAID sprzętowy:",o:["Wymaga oprogramowania OS","Realizuje obliczenia parzystości w dedykowanym chipie","Działa tylko z SSD","Nie obsługuje RAID 5"],c:1,e:"RAID sprzętowy ma własny procesor i pamięć cache; nie obciąża CPU. Software RAID — przez OS (mdadm, Storage Spaces)."},
{id:115,a:"P",q:"Dysk twardy zewnętrzny USB-C 3.2 Gen 2 osiąga max:",o:["100 MB/s","500 MB/s","1000 MB/s","5000 MB/s"],c:2,e:"USB 3.2 Gen 2 = 10 Gb/s = ~1000 MB/s teoretycznie. SSD wykorzysta to, HDD nie."},
{id:116,a:"P",q:"UPS (Uninterruptible Power Supply) służy do:",o:["Zasilania awaryjnego po zaniku prądu","Filtrowania internetu","Tworzenia kopii zapasowych","Drukowania"],c:0,e:"UPS dostarcza energię z baterii (line-interactive/online), umożliwia bezpieczne zamknięcie lub kontynuację pracy."},
{id:117,a:"P",q:"Patchpanel służy do:",o:["Łączenia kabli sieciowych w szafie krosowniczej","Drukowania","Skanowania","Routingu"],c:0,e:"Patchpanel agreguje przewody strukturalne; używa się keystone/kabli krosowych do switcha."},
{id:118,a:"P",q:"Skaner kodów kreskowych komunikuje się zwykle przez:",o:["Tylko Bluetooth","USB (HID — emulacja klawiatury) lub COM","HDMI","VGA"],c:1,e:"Czytniki bardzo często emulują klawiaturę — wpisują zeskanowany kod tam, gdzie kursor."},
{id:119,a:"P",q:"Modem ADSL używa do transmisji:",o:["Linii światłowodowej","Linii telefonicznej miedzianej","Sieci komórkowej","Wi-Fi"],c:1,e:"ADSL — Asymmetric Digital Subscriber Line, na klasycznej miedzianej parze. VDSL2 też miedź; FTTH — światłowód."},
{id:120,a:"P",q:"Wkładka SFP+ obsługuje przepustowość:",o:["1 Gb/s","10 Gb/s","25 Gb/s","100 Gb/s"],c:1,e:"SFP = 1 Gb/s, SFP+ = 10 Gb/s, SFP28 = 25, QSFP+ = 40, QSFP28 = 100."},

// --- DIAGNOSTYKA (D) ---
{id:121,a:"D",q:"Sygnały dźwiękowe BIOS przy starcie informują o:",o:["Wersji systemu","Błędach POST (np. RAM, GPU)","Stanie baterii laptopa","Połączeniu z siecią"],c:1,e:"BIOS używa kodów beep (np. AMI, Award) sygnalizujących błędy diagnostyczne POST: 1 long 2 short = błąd GPU, itp."},
{id:122,a:"D",q:"Komputer włącza się, wentylatory działają, ale brak obrazu. Najpierw sprawdź:",o:["System operacyjny","Pamięć RAM, kartę graficzną, kabel monitora","Drukarkę","Internet"],c:1,e:"Brak obrazu = problem warstwy sprzętowej: kabel monitora, RAM (re-seat, na pojedynczych modułach), GPU."},
{id:123,a:"D",q:"Niebieski ekran (BSOD) w Windows oznacza:",o:["Brak prądu","Krytyczny błąd jądra systemu","Aktualizację","Tryb prezentacji"],c:1,e:"BSOD pokazuje kod błędu (np. PAGE_FAULT_IN_NONPAGED_AREA) — wskazuje na sterowniki, RAM lub uszkodzenie systemu."},
{id:124,a:"D",q:"Aby przetestować pamięć RAM pod kątem błędów, użyjesz:",o:["chkdsk","memtest86","sfc","ping"],c:1,e:"memtest86/86+ to standard testowania RAM przez wielokrotny zapis/odczyt wzorców."},
{id:125,a:"D",q:"Komenda 'chkdsk /f /r' w Windows:",o:["Defragmentuje dysk","Sprawdza i naprawia błędy systemu plików oraz sektory dysku","Tworzy obraz","Nic nie robi"],c:1,e:"/f = napraw błędy systemu plików, /r = lokalizuj złe sektory i odzyskuj informacje."},
{id:126,a:"D",q:"Termiczne wyłączenie komputera (thermal shutdown) zwykle wskazuje na:",o:["Awarię zasilacza","Problem chłodzenia procesora (zatkany radiator, wyschnięta pasta)","Złą kartę sieciową","Wirus"],c:1,e:"CPU/GPU mają mechanizmy ochrony termicznej — wyłączenie chroni przed uszkodzeniem. Sprawdź wentylatory, pastę, kurz."},
{id:127,a:"D",q:"Komputer co kilka minut sam się wyłącza. Najbardziej prawdopodobna przyczyna:",o:["Brak miejsca na dysku","Przegrzewanie się lub awaria zasilacza","Stary mikrofon","Niska wersja oprogramowania"],c:1,e:"Niespodziewane wyłączenia: temperatura (CPU/GPU/VRM) lub PSU (spadki napięcia). Sprawdź temperatury i PSU."},
{id:128,a:"D",q:"SMART (Self-Monitoring) w dyskach służy do:",o:["Szyfrowania","Monitorowania kondycji i przewidywania awarii","Defragmentacji","Klonowania"],c:1,e:"SMART pokazuje atrybuty (Reallocated Sectors, Spin Retry, itp.) — narzędzia: smartctl, CrystalDiskInfo."},
{id:129,a:"D",q:"Dioda LED na płycie głównej oznaczona 'CPU' świeci ciągle. Oznacza to:",o:["Problem z procesorem lub jego zasilaniem","Brak Wi-Fi","Problem z drukarką","Uszkodzony monitor"],c:0,e:"LED diagnostyczne (Q-LED) wskazują który komponent zawodzi w POST: CPU, DRAM, VGA, BOOT."},
{id:130,a:"D",q:"Kabel sieciowy nie działa po przeniesieniu PC. Pierwszy krok:",o:["Wymienić zasilacz","Sprawdzić czy lampki LED na karcie sieciowej i switchu świecą","Reinstalować Windows","Wymienić CPU"],c:1,e:"Diody link/activity na NIC i switchu — najszybsza diagnostyka warstwy fizycznej."},
{id:131,a:"D",q:"Tester kabli UTP wykrywa:",o:["Ciągłość żył i kolejność (T568A/B)","Ilość RAM","Wersję BIOS","Hasło sieci"],c:0,e:"Tester pokazuje przerwy, zwarcia, krzyżowanie żył (split pair) i schemat zarobienia końcówek."},
{id:132,a:"D",q:"Komputer zatrzymuje się na ekranie 'No bootable device'. Sprawdź:",o:["Konto Windows","Kolejność boot w BIOS, podłączenie dysku, MBR/GPT","Klawiaturę","Drukarkę"],c:1,e:"Sprawdź czy dysk jest widoczny w BIOS, kolejność boot, integralność MBR/GPT, ewentualnie odbuduj bootloader."},
{id:133,a:"D",q:"Narzędzie 'Event Viewer' (Podgląd zdarzeń) w Windows:",o:["Tworzy nowe zdarzenia","Pokazuje logi systemowe, aplikacji, zabezpieczeń","Konfiguruje sieć","Defragmentuje dysk"],c:1,e:"Event Viewer = eventvwr.msc. Logi: System, Application, Security — kluczowe przy diagnostyce błędów."},
{id:134,a:"D",q:"Wadliwy moduł RAM w teście memtest objawia się:",o:["Brakiem dźwięku","Czerwonymi błędami z adresami","Wyższą wydajnością","Lepszą grafiką"],c:1,e:"Memtest pokazuje błędy z adresami pamięci (logical/physical). Wymień moduł lub przesuń do innego slotu, by zlokalizować."},
{id:135,a:"D",q:"Bateria CMOS jest rozładowana. Objaw:",o:["Czas/data się resetują, BIOS gubi ustawienia","Brak Wi-Fi","Wyższe FPS","Drukarka działa wolniej"],c:0,e:"CR2032 podtrzymuje pamięć ustawień i RTC. Po rozładowaniu — reset BIOS po wyłączeniu z sieci."},
{id:136,a:"D",q:"Polecenie 'ping 8.8.8.8' działa, ale 'ping google.com' nie. Problem dotyczy:",o:["Routingu","DNS","Karty sieciowej","Zasilania"],c:1,e:"Sieć działa (IP osiągalne), ale rozwiązywanie nazw nie — sprawdź konfigurację DNS w karcie sieciowej."},
{id:137,a:"D",q:"Wąchający się zapach plastiku z komputera + brak obrazu = ",o:["Normalne","Możliwe spalenie elementu (zwykle PSU lub VRM) — natychmiast wyłącz","Aktualizacja","Brak tonera"],c:1,e:"Zapach spalonej elektroniki = uszkodzenie. Wyłącz, odłącz zasilanie, oględziny — wzdęte kondensatory, ślady."},
{id:138,a:"D",q:"Drukarka drukuje 'puste' strony, choć tonera/tuszu jest dużo. Sprawdź:",o:["Wersję Windows","Sterownik, zatrzask kartridża, ewentualnie głowicę/uszczelkę","Sieć","Pamięć RAM"],c:1,e:"Atramentówka — czyszczenie głowicy. Laser — sprawdź zatrzask kartridża, korotron transferowy, uszkodzony bęben."},
{id:139,a:"D",q:"Komputer nie reaguje na przycisk Power. Pierwszy krok:",o:["Wymień RAM","Sprawdź zasilanie (kabel, listwa, wyłącznik PSU, przycisk Reset)","Reinstaluj Windows","Wymień GPU"],c:1,e:"Brak reakcji = sprawdź najprostsze: kabel zasilający, wyłącznik PSU (z tyłu), próba zwarcia pinów PWR na płycie."},
{id:140,a:"D",q:"Dysk SSD wykazuje 'Reallocated Sector Count' rosnący w SMART. Oznacza to:",o:["Dysk jest nowy","Zaczyna mieć złe komórki — rozważ wymianę","Lepsza wydajność","Aktualizacja firmware"],c:1,e:"Wzrost realokacji = pogorszenie kondycji nośnika. Backup, ewentualnie wymiana."},
{id:141,a:"D",q:"Komputer nie łączy się z siecią Wi-Fi domową (inne urządzenia działają). Sprawdź:",o:["Tylko zasilanie","Tryb samolotowy, sterownik karty Wi-Fi, zapisane hasło","Procesor","Drukarkę"],c:1,e:"Skoro inne klienty działają — problem po stronie tego PC: tryb samolotowy, sterownik, profil Wi-Fi."},
{id:142,a:"D",q:"Po aktualizacji systemu sterownik karty graficznej powoduje BSOD. Najszybsze rozwiązanie:",o:["Wymienić GPU","Tryb awaryjny → przywrócenie sterownika z DDU lub starszej wersji","Reinstalacja systemu","Wymiana RAM"],c:1,e:"Tryb awaryjny → DDU (Display Driver Uninstaller) → instalacja stabilnej wersji sterownika."},
{id:143,a:"D",q:"Multimetr w trybie pomiaru napięcia DC służy do sprawdzenia:",o:["Napięć linii zasilacza (12V, 5V, 3.3V)","Sieci Wi-Fi","Temperatury CPU","Adresu IP"],c:0,e:"Multimetrem w DC mierzymy napięcia PSU na molexach/SATA — odchyłki >5% świadczą o problemach."},
{id:144,a:"D",q:"Tonery i bębny laserowe są zużyte. Najczęstszy objaw:",o:["Zbyt szybki druk","Smużenie, jasne wydruki, powtarzające się ślady na stronie","Brak prądu","Niskie napięcie"],c:1,e:"Zużyte komponenty: smugi, bladość, powtarzające się punkty co obwód bębna (ok. 75 mm)."},
{id:145,a:"D",q:"Dysk twardy klika niespotykanym dźwiękiem. Działanie:",o:["Kontynuuj pracę","Natychmiast wyłącz, zrób backup z innej maszyny — możliwa awaria głowicy","Defragmentuj","Format"],c:1,e:"Klik (head clicking) = mechaniczna awaria. Im dłużej pracuje — tym mniej szans na odzyskanie. Backup priorytetem."},
{id:146,a:"D",q:"Komenda 'ipconfig /flushdns' w Windows:",o:["Resetuje hasło","Czyści cache DNS klienta","Restartuje sieć","Wyłącza interfejs"],c:1,e:"Po zmianach DNS lub problemach z rozwiązywaniem — czyszczenie cache DNS pomoże uniknąć nieaktualnych wpisów."},
{id:147,a:"D",q:"Komputer wolno działa, dysk obciążony 100%. Sprawdź:",o:["Procesy w Menedżerze zadań, kondycję dysku (SMART), antywirus","Wymień zasilacz","Aktualizacja BIOS","Wymień klawiaturę"],c:0,e:"Dysk @ 100% = zwykle: skanowanie AV, indeksowanie, Windows Update, awaria HDD. Sprawdź źródło i SMART."},
{id:148,a:"D",q:"Polecenie 'ping -t 192.168.1.1' w Windows:",o:["Wysyła jeden pakiet","Wysyła pakiety w pętli aż do przerwania (Ctrl+C)","Resetuje połączenie","Czyści cache"],c:1,e:"Flaga -t = ciągły ping. Przydatne do monitorowania stabilności połączenia."},
{id:149,a:"D",q:"Karta graficzna ma artefakty graficzne (zniekształcenia, kolorowe piksele). Możliwa przyczyna:",o:["Awaria pamięci VRAM lub GPU, problemy z chłodzeniem, sterownik","Brak DNS","Wymiana klawiatury","Zła rozdzielczość ekranu"],c:0,e:"Artefakty = zwykle: przegrzewanie GPU/VRAM, awaria pamięci, niestabilny OC. Test FurMark, monitoring temp."},
{id:150,a:"D",q:"Aby utworzyć obraz dysku do diagnostyki/backupu w Linuxie, użyjesz:",o:["dd if=/dev/sda of=/sciezka/obraz.img bs=4M","ls -la","ping","grep"],c:0,e:"dd kopiuje surowe dane sektor-po-sektorze. UWAGA na if/of (jak pomylisz — zniszczysz dysk!)."},
{id:151,a:"L",q:"Maksymalny czas pracy przy monitorze ekranowym, po którym pracownikowi przysługuje 5-minutowa przerwa, wynosi zgodnie z Kodeksem pracy:",o:["30 minut","45 minut","1 godzina","2 godziny"],c:2,e:"Rozporządzenie MPiPS w sprawie BHP na stanowiskach z monitorami ekranowymi: po każdej godzinie pracy przysługuje co najmniej 5 minut przerwy wliczanej do czasu pracy lub łączenie z innymi czynnościami niewymagającymi obsługi monitora."},
{id:152,a:"L",q:"Licencja OEM systemu Windows jest:",o:["Przenoszalna na dowolny komputer bez ograniczeń","Przypisana na stałe do konkretnego sprzętu (płyty głównej)","Bezpłatna dla użytkowników domowych","Ograniczona do 1 roku użytkowania"],c:1,e:"Licencja OEM (Original Equipment Manufacturer) jest trwale powiązana z urządzeniem, na którym pierwotnie aktywowano system. Po wymianie płyty głównej zwykle wymaga ponownego zakupu. Licencja BOX (Retail) jest przenoszalna między komputerami."},
{id:153,a:"L",q:"Licencja GNU GPL należy do grupy licencji:",o:["Komercyjnych zamkniętych","Open Source typu copyleft","Freeware bez dostępu do kodu","Shareware z opłatą po okresie próbnym"],c:1,e:"GNU GPL to licencja Open Source typu copyleft — udostępnia kod źródłowy i wymaga, by dzieła pochodne również były dystrybuowane na tej samej licencji. Freeware oznacza darmowe oprogramowanie bez kodu źródłowego."},
{id:154,a:"L",q:"Minimalna odległość oczu pracownika od ekranu monitora powinna wynosić:",o:["20-30 cm","40-75 cm","100-120 cm","150 cm"],c:1,e:"Zgodnie z normami BHP odległość oczu od monitora powinna wynosić 40–75 cm (najczęściej podaje się 50–70 cm). Górna krawędź ekranu na wysokości oczu lub nieco poniżej."},
{id:155,a:"L",q:"Symbol CE na sprzęcie komputerowym oznacza:",o:["Certyfikat Energy Star o niskim zużyciu energii","Zgodność z dyrektywami Unii Europejskiej","Produkt wytworzony w Chinach","Przedłużoną gwarancję 2-letnią"],c:1,e:"Oznaczenie CE (Conformité Européenne) potwierdza, że produkt spełnia wymagania zasadnicze odpowiednich dyrektyw UE (m.in. EMC, LVD, RoHS) i może być wprowadzony do obrotu na terenie Europejskiego Obszaru Gospodarczego."},
{id:156,a:"L",q:"Zużyty sprzęt elektroniczny należy zgodnie z ustawą o ZSEE przekazać:",o:["Do zwykłego pojemnika na odpady komunalne","Do PSZOK lub punktu zbiórki ZSEE","Do skupu złomu metali kolorowych","Spalić we własnym zakresie"],c:1,e:"Ustawa o zużytym sprzęcie elektrycznym i elektronicznym (ZSEE) zabrania wyrzucania elektrośmieci do odpadów komunalnych. Sprzęt oddajemy do PSZOK, punktu zbiórki ZSEE lub sprzedawcy przy zakupie nowego (1 za 1)."},
{id:157,a:"L",q:"Dokumentem opisującym sposób połączeń kablowych w sieci strukturalnej jest:",o:["Schemat blokowy systemu operacyjnego","Dokumentacja powykonawcza okablowania","Karta gwarancyjna switcha","Polityka prywatności RODO"],c:1,e:"Dokumentacja powykonawcza okablowania strukturalnego zawiera schemat tras kablowych, oznaczenia gniazd, długości linii, wyniki pomiarów certyfikacyjnych (NEXT, tłumienie, mapy żył) — wymagana przy odbiorze instalacji."},
{id:158,a:"L",q:"Norma PN-EN 50173 dotyczy:",o:["Bezpieczeństwa pracy z monitorami","Okablowania strukturalnego budynków","Ergonomii klawiatury","Ochrony danych osobowych"],c:1,e:"PN-EN 50173 to europejska norma określająca wymagania dla systemów okablowania strukturalnego (kategorie kabli, klasy łączy, topologie). Definiuje m.in. klasy D, E, EA, F dla różnych kategorii kabli (Cat5e, Cat6, Cat6A, Cat7)."},
{id:159,a:"L",q:"Kosztorys ofertowy w zamówieniu serwisowym powinien zawierać:",o:["Tylko cenę końcową brutto","Pozycje materiałowe, robocizna, VAT i wartość brutto","Imię i nazwisko technika oraz numer telefonu","Wyłącznie listę narzędzi diagnostycznych"],c:1,e:"Kosztorys to dokument finansowy z wyszczególnieniem materiałów (cena jedn. × ilość), robocizny (rbg × stawka), wartości netto, VAT i wartości brutto. Pozwala klientowi zweryfikować kalkulację."},
{id:160,a:"L",q:"Pierwszą pomocą dla osoby porażonej prądem jest:",o:["Polanie poszkodowanego wodą","Odłączenie źródła prądu i wezwanie pomocy, w razie potrzeby RKO","Natychmiastowe podanie napoju","Owinięcie poszkodowanego folią aluminiową"],c:1,e:"Procedura BHP: 1) odłączyć napięcie (wyłącznik, wyjęcie wtyczki) — nigdy nie dotykać porażonego pod napięciem, 2) wezwać pogotowie 112/999, 3) sprawdzić oddech i tętno, w razie braku rozpocząć RKO 30:2."},
{id:161,a:"L",q:"Klauzula RODO w dokumentacji serwisowej dotyczy:",o:["Ograniczenia odpowiedzialności producenta sprzętu","Przetwarzania danych osobowych klienta","Warunków gwarancji urządzenia","Norm jakości ISO 9001"],c:1,e:"RODO (GDPR) reguluje zasady przetwarzania danych osobowych. W serwisie IT klient powinien wyrazić zgodę na przetwarzanie danych (imię, nazwisko, telefon, dane z dysku) i otrzymać klauzulę informacyjną o administratorze danych."},
{id:162,a:"L",q:"Licencja CAL (Client Access License) Windows Server jest wymagana, gdy:",o:["Instalujesz system Windows Server na maszynie wirtualnej","Klient (użytkownik lub urządzenie) korzysta z usług serwera","Konfigurujesz statyczny adres IP serwera","Aktualizujesz sterowniki sieciowe"],c:1,e:"CAL (Client Access License) to licencja dostępu klienta — wymagana dla każdego użytkownika (User CAL) lub urządzenia (Device CAL), które łączy się z usługami Windows Server. Sama licencja serwera nie wystarcza."},
{id:163,a:"L",q:"Środkiem ochrony osobistej (ŚOI) podczas wymiany komponentów PC jest:",o:["Opaska antystatyczna ESD","Okulary VR","Kombinezon ognioodporny","Hełm ochronny"],c:0,e:"Opaska antystatyczna ESD wyrównuje potencjał technika z masą obudowy/maty, zapobiegając wyładowaniu, które mogłoby uszkodzić wrażliwe układy CMOS na płycie głównej, RAM czy karcie graficznej."},
{id:164,a:"L",q:"Gaśnica odpowiednia do gaszenia pożaru sprzętu komputerowego pod napięciem to gaśnica:",o:["Wodna (W)","Pianowa (P)","Śniegowa CO2 (typ BC/AB)","Z proszku wapna gaszonego"],c:2,e:"Gaśnica śniegowa (CO2) jest dielektrykiem — bezpieczna dla urządzeń pod napięciem, nie pozostawia osadu i nie uszkadza elektroniki. Gaśnice wodne i pianowe są zabronione przy urządzeniach elektrycznych."},
{id:165,a:"L",q:"Protokół zdawczo-odbiorczy serwisu komputera powinien obejmować:",o:["Stan kompletności sprzętu, opis usterki, datę i podpisy stron","Tylko numer seryjny urządzenia","Wyłącznie kwotę naprawy","Zdjęcie technika z klientem"],c:0,e:"Protokół zdawczo-odbiorczy chroni serwis i klienta — dokumentuje co zostało przyjęte (kompletność: zasilacz, kabel, akumulator), zgłoszoną usterkę, datę przyjęcia/zwrotu oraz podpisy obu stron."},
{id:166,a:"W",q:"Rola serwera DHCP w Windows Server odpowiada za:",o:["Tłumaczenie nazw domenowych na adresy IP","Automatyczne przydzielanie konfiguracji IP klientom","Uwierzytelnianie użytkowników w domenie","Udostępnianie plików przez SMB"],c:1,e:"DHCP (Dynamic Host Configuration Protocol) automatycznie przydziela klientom adres IP, maskę, bramę domyślną i serwery DNS z określonej puli (zakresu/scope). Tłumaczenie nazw to rola DNS."},
{id:167,a:"W",q:"Czas dzierżawy adresu DHCP (lease time) określa:",o:["Maksymalny rozmiar pakietu DHCP","Okres ważności przydzielonej konfiguracji IP dla klienta","Czas uruchomienia serwera DHCP","Liczbę jednoczesnych klientów"],c:1,e:"Lease time to czas, na jaki klient otrzymuje adres IP. Po upływie 50% czasu klient próbuje go odnowić (renew) u serwera. Domyślnie w Windows Server to 8 dni dla sieci przewodowych."},
{id:168,a:"W",q:"Rekord DNS typu A służy do mapowania:",o:["Nazwy hosta na adres IPv4","Nazwy hosta na adres IPv6","Aliasu na inną nazwę domenową","Domeny na serwer pocztowy"],c:0,e:"Rekord A (Address) mapuje nazwę hosta (np. www.firma.pl) na adres IPv4. Rekord AAAA odpowiada za IPv6, CNAME to alias nazwy, MX wskazuje serwer pocztowy."},
{id:169,a:"W",q:"Rekord MX w DNS określa:",o:["Maskę podsieci dla domeny","Serwer pocztowy obsługujący domenę","Adres serwera DNS","Czas życia rekordu (TTL)"],c:1,e:"Rekord MX (Mail Exchanger) wskazuje serwer pocztowy odpowiedzialny za odbieranie maili dla danej domeny. Posiada priorytet — niższa wartość = wyższy priorytet."},
{id:170,a:"W",q:"Active Directory Domain Services (AD DS) przechowuje informacje w:",o:["Plikach tekstowych w katalogu C:\\Windows","Bazie danych NTDS.DIT na kontrolerze domeny","Rejestrze systemowym Windows","Pliku hosts"],c:1,e:"AD DS przechowuje obiekty (użytkownicy, komputery, grupy, OU) w bazie danych NTDS.DIT (Extensible Storage Engine) na każdym kontrolerze domeny (DC). Replikacja zapewnia spójność między DC."},
{id:171,a:"W",q:"Aby promować Windows Server do roli kontrolera domeny, należy zainstalować rolę:",o:["DHCP Server","DNS Server","Active Directory Domain Services","File and Storage Services"],c:2,e:"Rola AD DS instalowana z Server Managera (lub PowerShell: Install-WindowsFeature AD-Domain-Services), następnie wykonanie kreatora promocji (dcpromo / Install-ADDSForest) tworzy kontroler domeny."},
{id:172,a:"W",q:"OU (Organizational Unit) w AD DS pozwala na:",o:["Tworzenie partycji dyskowych","Logiczne grupowanie obiektów i delegowanie uprawnień","Konfigurację firewalla","Definiowanie tras routingu"],c:1,e:"OU to jednostka organizacyjna — kontener AD pozwalający logicznie grupować użytkowników, komputery i grupy. Umożliwia stosowanie GPO oraz delegowanie zadań administracyjnych do określonej OU."},
{id:173,a:"W",q:"Polityki GPO są stosowane w kolejności (LSDOU):",o:["Site → Domain → OU → Local","Local → Site → Domain → OU","OU → Domain → Site → Local","Domain → Local → OU → Site"],c:1,e:"Kolejność stosowania GPO to LSDOU: Local Policy → Site → Domain → OU. Późniejsze polityki nadpisują wcześniejsze, więc GPO z OU mają najwyższy priorytet (chyba że ustawiono Enforced lub Block Inheritance)."},
{id:174,a:"W",q:"Polecenie wymuszające natychmiastowe odświeżenie zasad GPO na kliencie to:",o:["gpresult /R","gpupdate /force","secedit /refresh","policy /apply"],c:1,e:"gpupdate /force wymusza pełne ponowne zastosowanie wszystkich GPO (Computer i User). gpresult /R wyświetla raport zastosowanych polityk (RSoP), ale ich nie odświeża."},
{id:175,a:"W",q:"FSMO Schema Master jest rolą obecną:",o:["Na każdym kontrolerze domeny","Tylko jeden raz w całym lesie AD","Raz w każdej domenie","Tylko na serwerze DNS"],c:1,e:"Role FSMO: Schema Master i Domain Naming Master są unikalne w obrębie lasu (jedna instancja). RID Master, PDC Emulator i Infrastructure Master występują po jednej w każdej domenie."},
{id:176,a:"W",q:"Grupa zabezpieczeń typu Domain Local może zawierać:",o:["Tylko użytkowników z lokalnej domeny","Konta i grupy z dowolnej domeny w lesie, ale nadawana lokalnie","Tylko grupy uniwersalne","Wyłącznie konta komputerów"],c:1,e:"Grupy Domain Local mogą zawierać użytkowników/grupy z dowolnej zaufanej domeny, ale uprawnienia mogą być nadawane tylko do zasobów w domenie macierzystej. Strategia AGDLP: Account → Global → Domain Local → Permission."},
{id:177,a:"W",q:"Rezerwacja DHCP polega na:",o:["Wyłączeniu serwera DHCP na czas nocny","Trwałym przypisaniu konkretnego adresu IP do adresu MAC","Blokadzie adresów dla obcych klientów","Tworzeniu kopii zapasowej bazy DHCP"],c:1,e:"Rezerwacja (reservation) wiąże adres MAC karty sieciowej klienta z konkretnym adresem IP w obrębie zakresu (scope). Klient zawsze otrzymuje ten sam IP, mimo że konfiguracja jest dystrybuowana przez DHCP."},
{id:178,a:"W",q:"Strefa DNS typu Reverse Lookup Zone służy do:",o:["Tłumaczenia nazwy hosta na adres IP","Tłumaczenia adresu IP na nazwę hosta","Replikacji rekordów między DC","Buforowania zapytań DNS"],c:1,e:"Strefa wsteczna (reverse lookup) tłumaczy adresy IP na nazwy hostów (rekordy PTR), używana m.in. przez serwery pocztowe do weryfikacji nadawcy (rDNS) i przez nslookup z opcją -type=PTR."},
{id:179,a:"W",q:"Polecenie PowerShell tworzące nowego użytkownika w AD to:",o:["New-LocalUser","New-ADUser","Add-User","Create-DomainUser"],c:1,e:"Cmdlet New-ADUser (z modułu ActiveDirectory) tworzy konto w domenie, np.: New-ADUser -Name 'Jan Kowalski' -SamAccountName jkowalski -Path 'OU=Pracownicy,DC=firma,DC=local' -AccountPassword (Read-Host -AsSecureString) -Enabled $true."},
{id:180,a:"W",q:"Profil mobilny (roaming profile) użytkownika domenowego:",o:["Jest przechowywany lokalnie tylko na jednym komputerze","Jest pobierany z udziału sieciowego po zalogowaniu na dowolnym komputerze domeny","Wymaga osobnej licencji M365","Działa tylko z laptopami"],c:1,e:"Profil mobilny przechowywany jest na serwerze plików (UNC: \\\\serwer\\profile$\\%username%). Po zalogowaniu kopiowany lokalnie, po wylogowaniu — synchronizowany z serwerem. Pozwala na te same ustawienia na każdej stacji domeny."},
{id:181,a:"6",q:"Adres IPv6 fe80::/10 oznacza adres typu:",o:["Globalny unicast","Link-local","Multicast","Pętli zwrotnej (loopback)"],c:1,e:"Prefiks fe80::/10 to adresy link-local — automatycznie generowane na każdym interfejsie IPv6 i ważne tylko w obrębie pojedynczego segmentu sieci. Loopback IPv6 to ::1, multicast — ff00::/8."},
{id:182,a:"6",q:"Skrócony zapis adresu IPv6 2001:0db8:0000:0000:0000:0000:1428:57ab to:",o:["2001:db8::1428:57ab","2001:0db8::1428::57ab","2001:db8:1428:57ab","2001::db8:1428:57ab"],c:0,e:"Reguły skracania IPv6: 1) usuwamy wiodące zera w każdej grupie (0db8 → db8), 2) jeden ciąg samych zer zastępujemy '::' (tylko raz w adresie). Wynik: 2001:db8::1428:57ab."},
{id:183,a:"6",q:"Adres IPv6 ::1 oznacza:",o:["Adres broadcastu","Adres pętli zwrotnej (loopback)","Adres link-local","Bramę domyślną"],c:1,e:"::1/128 to adres pętli zwrotnej IPv6 (odpowiednik 127.0.0.1 w IPv4). IPv6 nie posiada adresu rozgłoszeniowego (broadcast) — zastępuje go multicast (np. ff02::1 dla wszystkich węzłów w segmencie)."},
{id:184,a:"6",q:"Liczba bitów adresu IPv6 wynosi:",o:["32","64","128","256"],c:2,e:"Adres IPv6 ma 128 bitów (16 bajtów), zapisywany jako 8 grup po 4 cyfry szesnastkowe. Daje to teoretyczną pulę 2^128 adresów. IPv4 ma 32 bity."},
{id:185,a:"6",q:"Statyczna trasa w routerze Cisco dodawana jest poleceniem:",o:["set route 10.0.0.0 mask 255.0.0.0 next-hop 192.168.1.1","ip route 10.0.0.0 255.0.0.0 192.168.1.1","route add 10.0.0.0/8 via 192.168.1.1","static-route 10.0.0.0 192.168.1.1"],c:1,e:"Składnia w trybie konfiguracji globalnej IOS: ip route <sieć_docelowa> <maska> <next-hop|interfejs_wyjściowy> [dystans_administracyjny]. Np. ip route 10.0.0.0 255.0.0.0 192.168.1.1."},
{id:186,a:"6",q:"Brama domyślna (default gateway) w tablicy routingu reprezentowana jest przez sieć:",o:["255.255.255.255/32","0.0.0.0/0","127.0.0.1/8","169.254.0.0/16"],c:1,e:"Trasa domyślna (default route) ma adres docelowy 0.0.0.0 z maską 0.0.0.0 (/0) — pasuje do dowolnego adresu IP, gdy żadna bardziej specyficzna trasa nie pasuje (longest prefix match)."},
{id:187,a:"6",q:"Adres globalny unicast IPv6 zaczyna się od prefiksu:",o:["fe80::/10","fc00::/7","2000::/3","ff00::/8"],c:2,e:"Globalny unicast IPv6 należy do zakresu 2000::/3 (czyli pierwszy znak to 2 lub 3) — odpowiednik publicznego adresu IPv4. fc00::/7 to ULA (unique local), ff00::/8 — multicast."},
{id:188,a:"6",q:"Mechanizm SLAAC w IPv6 służy do:",o:["Szyfrowania ruchu IPv6","Automatycznej konfiguracji adresu na podstawie ogłoszeń routera (RA)","Tłumaczenia IPv6 na IPv4","Filtrowania pakietów ICMPv6"],c:1,e:"SLAAC (Stateless Address Autoconfiguration) — host generuje sobie adres IPv6 na podstawie prefiksu otrzymanego od routera w komunikacie Router Advertisement i własnego identyfikatora interfejsu (EUI-64 lub losowy)."},
{id:189,a:"6",q:"Protokół dynamicznego routingu typu link-state to:",o:["RIPv2","OSPF","BGP","EIGRP"],c:1,e:"OSPF (Open Shortest Path First) to protokół link-state — każdy router buduje pełną mapę topologii (LSDB) i wybiera najkrótszą ścieżkę algorytmem Dijkstry. RIP to distance-vector, BGP — path-vector, EIGRP — hybrydowy."},
{id:190,a:"6",q:"ICMPv6 typu Neighbor Solicitation (NS) zastępuje w IPv6 protokół:",o:["DHCP","ARP","DNS","ICMP Echo"],c:1,e:"W IPv6 nie ma protokołu ARP. NDP (Neighbor Discovery Protocol) wykorzystuje wiadomości ICMPv6 NS (Neighbor Solicitation) i NA (Neighbor Advertisement) do mapowania adresów IPv6 na adresy MAC."},
{id:191,a:"V",q:"Hyper-V to technologia wirtualizacji typu:",o:["Hosted (typ 2) — uruchamiana na systemie hosta","Bare-metal hypervisor (typ 1)","Emulator sprzętowy aplikacyjny","Konteneryzacja (Docker)"],c:1,e:"Hyper-V to hypervisor typu 1 (bare-metal) — działa bezpośrednio na sprzęcie. Po włączeniu roli system Windows staje się partycją nadrzędną (parent), maszyny gości — partycjami potomnymi. VirtualBox/VMware Workstation to typ 2."},
{id:192,a:"V",q:"Format dysku wirtualnego stosowany w Hyper-V to:",o:[".vmdk",".vdi",".vhd / .vhdx",".qcow2"],c:2,e:"Hyper-V używa VHD (starszy, max 2 TB) lub VHDX (od Server 2012, max 64 TB, odporność na uszkodzenia). VMDK to VMware, VDI — VirtualBox, QCOW2 — KVM/QEMU."},
{id:193,a:"V",q:"Snapshot (punkt kontrolny) maszyny wirtualnej:",o:["Tworzy pełną kopię pliku VHDX na innym dysku","Zapisuje stan maszyny do późniejszego przywrócenia, używając pliku różnicowego","Defragmentuje dysk wirtualny","Aktualizuje system gościa"],c:1,e:"Snapshot/checkpoint zapisuje aktualny stan VM (pamięć + dysk) i tworzy plik różnicowy AVHDX, do którego trafiają nowe zapisy. Dłuższe trzymanie wielu snapshotów degraduje wydajność — zalecane do testów, nie jako backup."},
{id:194,a:"V",q:"Backup pełny (full) charakteryzuje się tym, że:",o:["Kopiuje tylko pliki zmienione od ostatniego backupu","Kopiuje wszystkie wybrane dane za każdym razem","Wymaga przyrostowych do odzyskania","Działa tylko na systemach Windows"],c:1,e:"Backup pełny kopiuje całość danych za każdym razem — najwięcej miejsca i czasu, ale najszybsze odtwarzanie (jeden zestaw). Stanowi punkt bazowy dla strategii przyrostowych i różnicowych."},
{id:195,a:"V",q:"Backup różnicowy (differential) różni się od przyrostowego (incremental) tym, że:",o:["Różnicowy kopiuje wszystko, przyrostowy tylko zmiany","Różnicowy zapisuje zmiany od ostatniego pełnego, przyrostowy — od ostatniego dowolnego","Różnicowy działa na taśmach, przyrostowy na dyskach","Nie ma między nimi różnicy"],c:1,e:"Różnicowy zawsze odnosi się do ostatniego backupu pełnego (rośnie z czasem). Przyrostowy odnosi się do ostatniego backupu (full lub incremental). Odtwarzanie: full+ostatni differential, lub full+wszystkie incremental."},
{id:196,a:"V",q:"Strategia rotacji nośników GFS (Grandfather-Father-Son) zakłada:",o:["Trzy generacje kopii: dzienne, tygodniowe, miesięczne","Trzech administratorów backupu","Trzy lokalizacje geograficzne","Trzykrotne szyfrowanie danych"],c:0,e:"GFS to schemat retencji: Son = backup dzienny (codzienny), Father = tygodniowy, Grandfather = miesięczny. Pozwala odtworzyć dane z różnych horyzontów czasowych przy ograniczonej liczbie nośników."},
{id:197,a:"V",q:"Reguła backupu 3-2-1 mówi, że należy mieć:",o:["3 kopie, na 2 różnych nośnikach, 1 poza siedzibą","3 administratorów, 2 lokalizacje, 1 hasło","3 dyski w RAID 1, 2 zasilacze, 1 UPS","3 dni retencji, 2 godziny RPO, 1 godzinę RTO"],c:0,e:"Reguła 3-2-1: 3 kopie danych (oryginał + 2 kopie zapasowe), na 2 różnych typach nośników (np. dysk + taśma/chmura), z czego 1 kopia w lokalizacji zewnętrznej (off-site/chmura) — ochrona przed pożarem, kradzieżą, ransomware."},
{id:198,a:"V",q:"Funkcja Live Migration w Hyper-V umożliwia:",o:["Migrację konta użytkownika między domenami","Przenoszenie działającej maszyny wirtualnej między hostami bez przerywania pracy","Aktualizację BIOS-u serwera","Zmianę systemu plików w locie"],c:1,e:"Live Migration kopiuje pamięć VM między hostami klastra, a następnie przełącza wykonywanie na nowy host — bez wyłączania VM. Wymaga klastra failover lub SMB 3.0 (Shared Nothing Live Migration)."},
{id:199,a:"V",q:"Parametr RPO (Recovery Point Objective) określa:",o:["Maksymalny dopuszczalny czas niedostępności systemu","Maksymalną dopuszczalną utratę danych w czasie","Liczbę kopii zapasowych","Pojemność nośnika backupu"],c:1,e:"RPO to maksymalna akceptowalna ilość utraconych danych liczona w czasie (np. 1h = backup co godzinę). RTO (Recovery Time Objective) to maksymalny czas odtworzenia. Razem definiują SLA odtwarzania."},
{id:200,a:"V",q:"Maksymalny rozmiar dysku wirtualnego VHDX wynosi:",o:["2 TB","16 TB","64 TB","256 TB"],c:2,e:"VHDX (Hyper-V od Windows Server 2012) obsługuje dyski wirtualne do 64 TB i sektory 4K. Starszy format VHD ograniczony jest do 2 TB i sektorów 512B."},
{id:201,a:"Z",q:"BitLocker w systemie Windows służy do:",o:["Kompresji plików w czasie rzeczywistym","Szyfrowania całych woluminów dyskowych","Tworzenia kopii zapasowych","Optymalizacji startu systemu"],c:1,e:"BitLocker to mechanizm szyfrowania całych woluminów (full disk encryption) wykorzystujący AES (128 lub 256 bit). Najlepiej współpracuje z układem TPM 2.0, który przechowuje klucze szyfrowania."},
{id:202,a:"Z",q:"Układ TPM przechowuje:",o:["Pliki użytkownika","Klucze kryptograficzne i certyfikaty","Sterowniki sprzętowe","Kopie zapasowe rejestru"],c:1,e:"TPM (Trusted Platform Module) to dedykowany chip kryptograficzny przechowujący klucze, hashe i certyfikaty w sposób odporny na manipulacje. BitLocker używa go do bezpiecznego odblokowywania dysku przy starcie."},
{id:203,a:"Z",q:"W systemie NTFS, gdy użytkownik należy do dwóch grup z konfliktującymi uprawnieniami, obowiązuje zasada:",o:["Allow zawsze wygrywa nad Deny","Deny ma pierwszeństwo nad Allow","Decyduje kolejność alfabetyczna grup","Decyduje wiek konta użytkownika"],c:1,e:"W ACL NTFS wprost ustawione Deny ma zawsze pierwszeństwo nad Allow. Wyjątek: jawne (explicit) Allow nadpisuje dziedziczone (inherited) Deny. Reguła to fundament planowania uprawnień AGDLP."},
{id:204,a:"Z",q:"EFS (Encrypting File System) szyfruje:",o:["Cały dysk wraz z systemem operacyjnym","Pojedyncze pliki i foldery na woluminie NTFS","Tylko pliki w sieci","Pliki rejestru Windows"],c:1,e:"EFS to mechanizm szyfrowania na poziomie pliku/folderu w NTFS, powiązany z certyfikatem użytkownika. Klucz pliku (FEK) szyfrowany jest kluczem publicznym użytkownika. Dla całego dysku stosuje się BitLocker."},
{id:205,a:"Z",q:"Polityka haseł w GPO 'Minimum password length' = 12 oznacza:",o:["Hasło wygasa po 12 dniach","Hasło musi mieć co najmniej 12 znaków","Maksymalnie 12 nieudanych logowań","Historia 12 ostatnich haseł"],c:1,e:"Polityka 'Minimum password length' wymusza minimalną długość hasła (np. 12 znaków). 'Password history' określa liczbę zapamiętanych poprzednich haseł, 'Maximum password age' — czas wygaśnięcia, 'Account lockout' — limit prób."},
{id:206,a:"Z",q:"Uprawnienie NTFS 'Modify' obejmuje:",o:["Tylko odczyt pliku","Odczyt, zapis, usuwanie pliku, ale bez zmiany uprawnień","Pełną kontrolę z możliwością zmiany właściciela","Wyłącznie wykonywanie programów"],c:1,e:"Modify = Read & Execute + Write + Delete (dla pojedynczego pliku/folderu). Nie zawiera zmiany uprawnień (Change Permissions) ani przejęcia własności (Take Ownership) — te są w Full Control."},
{id:207,a:"Z",q:"Atak typu phishing polega na:",o:["Przeciążeniu serwera pakietami SYN","Wyłudzaniu danych przez podszywanie się pod zaufany podmiot","Łamaniu haseł metodą słownikową","Przechwytywaniu pakietów w sieci Wi-Fi"],c:1,e:"Phishing to socjotechnika — atakujący podszywa się pod znaną instytucję (bank, firma kurierska) i wysyła sfałszowane maile/SMSy z linkami do fałszywych stron lub załącznikami z malware, w celu wyłudzenia danych logowania."},
{id:208,a:"Z",q:"Zasada 'least privilege' (najmniejszych uprawnień) oznacza:",o:["Każdy użytkownik ma uprawnienia administratora","Użytkownik ma tylko uprawnienia niezbędne do wykonywania swoich zadań","Wszyscy mają dostęp tylko do odczytu","Hasła są wspólne dla zespołu"],c:1,e:"Least privilege (najmniejsze konieczne uprawnienia) to filar bezpieczeństwa — minimalizuje skutki kompromitacji konta. W praktyce: użytkownicy bez praw lokalnego administratora, role dedykowane do zadań."},
{id:209,a:"Z",q:"Uwierzytelnianie wieloskładnikowe (MFA) wymaga co najmniej:",o:["Dwóch haseł","Dwóch z trzech: coś co wiesz, coś co masz, czymś jesteś","Hasła i numeru telefonu","Loginu i adresu e-mail"],c:1,e:"MFA łączy minimum dwa różne czynniki uwierzytelnienia: wiedza (hasło/PIN), posiadanie (token, telefon, klucz U2F), cecha (biometria). Dwa hasła to nie MFA — to wciąż jeden czynnik (wiedza)."},
{id:210,a:"Z",q:"AppLocker w Windows służy do:",o:["Defragmentacji aplikacji","Definiowania reguł, które aplikacje mogą być uruchamiane","Aktualizacji aplikacji ze sklepu Microsoft","Wyłączania klawiszy specjalnych"],c:1,e:"AppLocker (dostępny w Enterprise/Education) pozwala administratorowi tworzyć białe/czarne listy aplikacji wg ścieżki, wydawcy lub hasha pliku — zapobiega uruchomieniu nieautoryzowanych programów (np. ransomware)."},
{id:211,a:"R",q:"RAID 5 zbudowany z 4 dysków po 2 TB ma pojemność użytkową:",o:["4 TB","6 TB","8 TB","2 TB"],c:1,e:"RAID 5 wykorzystuje (n-1) dysków na dane: (4-1) × 2 TB = 6 TB. Jeden dysk pojemnościowy poświęcony jest na rozproszone bity parzystości — odporność na awarię 1 dysku."},
{id:212,a:"R",q:"RAID 10 zbudowany z 4 dysków po 1 TB daje pojemność użytkową:",o:["1 TB","2 TB","3 TB","4 TB"],c:1,e:"RAID 10 (1+0) = stripe lustrzanych par. 4 dyski tworzą 2 pary lustrzane (mirror), z których stripe daje 2 × 1 TB = 2 TB. Odporny na awarię 1 dysku z każdej pary."},
{id:213,a:"R",q:"Sieć 192.168.1.0/24 podzielono na podsieci /27. Liczba uzyskanych podsieci to:",o:["4","8","16","32"],c:1,e:"Pożyczamy (27-24) = 3 bity na podsieci → 2^3 = 8 podsieci po 32 adresy każda (z czego 30 użytkowych). Pierwsza: 192.168.1.0/27, ostatnia: 192.168.1.224/27."},
{id:214,a:"R",q:"Liczba hostów użytkowych w podsieci /29 wynosi:",o:["2","6","8","14"],c:1,e:"/29 = 32-29 = 3 bity hosta → 2^3 = 8 adresów, minus adres sieci i broadcast = 6 hostów użytkowych. Często używana do połączeń point-to-point z rezerwą."},
{id:215,a:"R",q:"Adres rozgłoszeniowy podsieci 10.20.30.64/27 to:",o:["10.20.30.63","10.20.30.95","10.20.30.96","10.20.30.127"],c:1,e:"/27 → blok 32 adresów. Sieć 64, broadcast = 64 + 32 - 1 = 95. Zakres hostów: 10.20.30.65 – 10.20.30.94."},
{id:216,a:"R",q:"Sieć potrzebuje pomieścić 50 hostów. Najbardziej oszczędna maska to:",o:["/24","/25","/26","/27"],c:2,e:"Dla 50 hostów potrzeba 50+2 (sieć/broadcast) = min. 64 adresów. 2^6 = 64, więc 6 bitów hosta → maska /26 (32-6=26). /27 daje tylko 30 hostów — za mało."},
{id:217,a:"R",q:"Dla adresu 172.16.50.130/22 adres sieci to:",o:["172.16.48.0","172.16.49.0","172.16.50.0","172.16.52.0"],c:0,e:"/22 = maska 255.255.252.0 → blok 4 w trzecim oktecie. Sieci 172.16.0.0, 4.0, 8.0... 48.0, 52.0. 50 mieści się w 48–51, więc adres sieci to 172.16.48.0/22."},
{id:218,a:"R",q:"Klient po podłączeniu do sieci otrzymał IP 169.254.10.5. Oznacza to:",o:["Poprawne pobranie z DHCP","Brak komunikacji z DHCP — adres APIPA","Adres z sieci publicznej","Konfigurację statyczną z routera"],c:1,e:"169.254.0.0/16 to zakres APIPA (Automatic Private IP Addressing) — Windows nadaje go sam, gdy nie udało się skontaktować z serwerem DHCP. Diagnozujemy: kabel, port DHCP, scope, firewall serwera."},
{id:219,a:"R",q:"Komputer ma IP 192.168.1.10/24, brama 192.168.1.1. Nie pinguje 8.8.8.8, ale pinguje 192.168.1.1. Najbardziej prawdopodobna przyczyna to:",o:["Wadliwa karta sieciowa","Brak konfiguracji DNS","Problem z bramą/routerem (np. brak NAT, brak Internetu na WAN)","Zła maska podsieci"],c:2,e:"Skoro brama odpowiada (warstwa 3 LAN OK), ale nie ma odpowiedzi spoza sieci — problem leży po stronie routera (brak Internetu na WAN, NAT, ACL) lub trasy domyślnej. DNS nie wpływa na ping po IP."},
{id:220,a:"R",q:"Zaprojektuj adresację dla 4 oddziałów po max. 25 komputerów, startując z 192.168.10.0/24. Użyta maska podsieci to:",o:["/26","/27","/28","/29"],c:1,e:"25 hostów + 2 (sieć/broadcast) = 27. 2^5 = 32 ≥ 27, więc 5 bitów hosta → /27. Daje 8 podsieci po 30 hostów: 192.168.10.0, .32, .64, .96 (wystarcza dla 4 oddziałów)."},
{id:221,a:"R",q:"W kosztorysie sieci potrzebne jest 80 m kabla UTP Cat 6 po 2,50 zł/m + 8 gniazd RJ-45 po 12 zł. Wartość netto materiałów wynosi:",o:["196 zł","296 zł","320 zł","260 zł"],c:1,e:"Kabel: 80 × 2,50 = 200 zł. Gniazda: 8 × 12 = 96 zł. Razem netto: 200 + 96 = 296 zł. Wartość brutto przy VAT 23%: 296 × 1,23 = 364,08 zł."},
{id:222,a:"R",q:"Czas pełnego backupu 500 GB przy prędkości 100 MB/s wynosi około:",o:["50 sekund","5 minut","83 minuty","8 godzin"],c:2,e:"500 GB = 500 000 MB. 500 000 / 100 = 5000 s ≈ 83 minuty (1 godz. 23 min). Pamiętaj: w praktyce dochodzi narzut protokołu i wahań prędkości."},
{id:223,a:"R",q:"Komputer wyświetla BSOD z kodem 0x0000007B (INACCESSIBLE_BOOT_DEVICE). Pierwszą czynnością diagnostyczną jest:",o:["Wymiana zasilacza","Sprawdzenie kontrolera SATA/AHCI/RAID w BIOS i kabli dysku","Przeinstalowanie sterownika karty graficznej","Wymiana klawiatury"],c:1,e:"Błąd 0x7B oznacza, że Windows nie może odczytać woluminu rozruchowego — najczęściej przez zmianę trybu kontrolera (AHCI ↔ RAID ↔ IDE), uszkodzony kabel/dysk lub brak sterownika kontrolera w obrazie systemu."},
{id:224,a:"R",q:"Stacja robocza nie łączy się z udziałem \\\\fileserver\\dane. Polecenie do diagnostyki uprawnień udziału z linii komend to:",o:["ipconfig /flushdns","net use Z: \\\\fileserver\\dane","tracert fileserver","chkdsk C: /f"],c:1,e:"Polecenie 'net use Z: \\\\fileserver\\dane' próbuje zmapować dysk i zwraca konkretny błąd (np. 'Access denied' = problem z uprawnieniami SMB/NTFS, 'Network path not found' = DNS/firewall)."},
{id:225,a:"R",q:"Drukarka sieciowa 192.168.5.20 nie odpowiada. Pierwszy poziom diagnostyki to:",o:["Wymiana tonera","ping 192.168.5.20 + sprawdzenie diody LAN i konfiguracji IP drukarki","Reinstalacja systemu Windows","Format dysku stacji roboczej"],c:1,e:"Diagnostyka zaczyna się od warstw niskich: link (dioda LAN), warstwa 3 (ping IP, ARP), warstwa 4-7 (port 9100/IPP, sterownik). Toner i format to ostateczność."},
{id:226,a:"R",q:"RAID 6 z 6 dysków po 4 TB ma pojemność użytkową:",o:["12 TB","16 TB","20 TB","24 TB"],c:1,e:"RAID 6 wykorzystuje 2 dyski pojemnościowe na podwójną parzystość: (n-2) × pojemność = (6-2) × 4 TB = 16 TB. Odporny na jednoczesną awarię 2 dysków."},
{id:227,a:"R",q:"Łączny wpływ kompresji 1,5:1 i deduplikacji 2:1 na 600 GB danych daje rozmiar po backupie:",o:["100 GB","200 GB","300 GB","400 GB"],c:1,e:"Najpierw deduplikacja: 600 / 2 = 300 GB. Następnie kompresja: 300 / 1,5 = 200 GB. Kolejność operacji nie zmienia wyniku w tym uproszczonym modelu (mnożenie współczynników)."},
{id:228,a:"R",q:"Klient zgłasza brak dźwięku po aktualizacji Windows. Pierwsze działanie diagnostyczne:",o:["Wymiana karty dźwiękowej","Sprawdzenie urządzenia domyślnego w panelu Dźwięk i statusu sterownika w Menedżerze urządzeń","Zwrot komputera do producenta","Reinstalacja systemu"],c:1,e:"Po aktualizacji typowe przyczyny: zmiana urządzenia domyślnego (np. monitor HDMI), zaktualizowany ogólny sterownik HD Audio. Sprawdzamy panel Dźwięk → Odtwarzanie i Menedżer urządzeń → Kontrolery dźwięku."},

// =============== PROGRESS HELPERS ===============
function dueSrs(){
  const now=Date.now();
  return Object.entries(state.srs).filter(([_,v])=>v.due<=now).map(([k])=>parseInt(k));
}
function progressByArea(){
  const out={};
  for(const a of Object.keys(AREAS)){
    const inArea=QUESTIONS.filter(q=>q.a===a);
    const answeredCorrect=inArea.filter(q=>state.answered[q.id]&&state.answered[q.id].correct).length;
    out[a]={total:inArea.length,correct:answeredCorrect,pct:Math.round(answeredCorrect/inArea.length*100)};
  }
  return out;
}
function totalProgress(){
  const total=QUESTIONS.length;
  const correct=Object.values(state.answered).filter(x=>x.correct).length;
  return {total,correct,pct:Math.round(correct/total*100)};
}
function daysToExam(){
  const now=new Date();
  return Math.ceil((EXAM_DATE-now)/(1000*60*60*24));
}

window.startQuiz=function(n,seconds){
  const shuffled = (window.AdaptiveEngine && AdaptiveEngine.selectQuizQuestions)
    ? AdaptiveEngine.selectQuizQuestions(n, QUESTIONS)
    : [...QUESTIONS].sort(()=>Math.random()-0.5).slice(0,n);
  quizState={questions:shuffled,answers:Array(n).fill(null),current:0,startTime:Date.now(),duration:seconds,total:n};
  startTimer(seconds);
  render("quiz");
};

function startTimer(seconds){
  const t=document.getElementById("timer");
  t.style.display="block";
  function update(){
    const left=quizState.duration-Math.floor((Date.now()-quizState.startTime)/1000);
    if(left<=0){clearInterval(timerInterval);finishQuiz();return;}
    const m=Math.floor(left/60),s=left%60;
    t.textContent=`⏱ ${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
    t.className="timer"+(left<300?" crit":left<600?" warn":"");
  }
  update();
  timerInterval=setInterval(update,1000);
}

window.finishQuiz=function(){
  clearInterval(timerInterval);
  document.getElementById("timer").style.display="none";
  const dur=Math.floor((Date.now()-quizState.startTime)/1000);
  let score=0;
  const wrongIds=[];
  quizState.questions.forEach((q,i)=>{
    const correct=quizState.answers[i]===q.c;
    if(correct)score++;
    else wrongIds.push(q.id);
    state.answered[q.id]={correct,ts:Date.now(),attempts:(state.answered[q.id]?.attempts||0)+1};
    // Update SRS: wrong → box1, correct → advance
    const cur=state.srs[q.id];
    if(correct){
      const box=Math.min(5,(cur?.box||0)+1);
      state.srs[q.id]={box,due:Date.now()+srsBoxToMs(box)};
    } else {
      state.srs[q.id]={box:1,due:Date.now()+srsBoxToMs(1)};
    }
  });
  state.stats.quizzes.push({score,total:quizState.total,date:Date.now(),duration:dur});
  saveState();
  const _pct = Math.round(score/quizState.total*100);
  if(window.UX){
    if(UX.achievements&&UX.achievements.checkAll)UX.achievements.checkAll(state);
    if(UX.fx&&UX.fx.confetti && _pct>=50)UX.fx.confetti();
  }
  if(window.AdaptiveEngine&&AdaptiveEngine.markDiagnosisComplete && quizState.isDiagnostic){
    AdaptiveEngine.markDiagnosisComplete(quizState.questions.map((q,i)=>({qid:q.id,area:q.a,correct:quizState.answers[i]===q.c})));
    state.diagnosisComplete=true;saveState();
  }
  showQuizResults(score,dur,wrongIds);
};

function srsBoxToMs(box){
  // Box 1: 10 min, Box 2: 1 day, Box 3: 3 days, Box 4: 7 days, Box 5: 21 days
  return [10*60*1000,24*60*60*1000,3*24*60*60*1000,7*24*60*60*1000,21*24*60*60*1000][box-1];
}

      <div style="color:var(--muted)">${score} / ${quizState.total} poprawnie · czas: ${Math.floor(dur/60)} min ${dur%60}s</div>
      <div class="note">Próg zdawalności pisemnego INF.02: 50%. ${wrongIds.length} pytań trafiło do kolejki SR.</div>
      <div class="toolbar" style="justify-content:center;margin-top:16px">
        <button class="btn" onclick="quizState=null;render('quiz')">Nowy quiz</button>
        <button class="btn ghost" onclick="quizState=null;render('dash')">Dashboard</button>
      </div>
    </div>
    ${wrongQuestions.length?`

      <h2>Pytania, w których popełniłeś błąd (${wrongQuestions.length})</h2>
      ${wrongQuestions.map(({q,userAns})=>`

          <div class="q-text">${q.q}</div>
          ${q.o.map((opt,i)=>`<div class="opt disabled ${i===q.c?'correct':i===userAns?'wrong':''}">${String.fromCharCode(65+i)}. ${opt}</div>`).join("")}
          <div class="explanation"><b>Wyjaśnienie:</b> ${q.e}</div>
        </div>`).join("")}
    </div>`:`<div class="card empty">🎯 Wszystkie pytania poprawne!</div>`}
  `;

window.srsAnswer=function(i){
  const qid=srsState.queue[srsState.current];
  const q=QUESTIONS.find(x=>x.id===qid);
  const correct=i===q.c;
  if(correct)srsState.results.correct++;else srsState.results.wrong++;
  state.answered[qid]={correct,ts:Date.now(),attempts:(state.answered[qid]?.attempts||0)+1};
  const cur=state.srs[qid];
  if(correct){const box=Math.min(5,(cur?.box||1)+1);state.srs[qid]={box,due:Date.now()+srsBoxToMs(box)};}
  else state.srs[qid]={box:1,due:Date.now()+srsBoxToMs(1)};
  saveState();
  if(window.UX&&UX.streak)UX.streak.markActivity(state);
  if(window.UX&&UX.fx&&UX.fx.haptic)UX.fx.haptic(correct);
  if(window.AdaptiveEngine&&AdaptiveEngine.recordAnswer)AdaptiveEngine.recordAnswer(qid,correct,q.a);

  // Show answer feedback briefly
  const card=document.getElementById("srs-card");
  if(card){
    const opts=card.querySelectorAll(".opt");
    opts.forEach((el,idx)=>{el.classList.add("disabled");if(idx===q.c)el.classList.add("correct");else if(idx===i)el.classList.add("wrong");});
    const ex=document.createElement("div");ex.className="explanation";ex.innerHTML="<b>Wyjaśnienie:</b> "+q.e;
    card.appendChild(ex);
    const next=document.createElement("button");next.className="btn";next.textContent="Następne →";next.style.marginTop="12px";

function subnetCalcHtml(){
  return `<div class="card"><h2>Kalkulator podsieci IPv4</h2>
    <div class="subnet-grid">
      <label>Adres IP:</label><input id="snip" value="192.168.1.0" oninput="updateSubnet()">
      <label>Maska / CIDR:</label><input id="sncidr" value="24" type="number" min="0" max="32" oninput="updateSubnet()">
    </div>
    <div class="subnet-out" id="snout"></div>
    <div class="note">Zmieniaj wartości, by zobaczyć wyniki na żywo. Maska może być w postaci /24 lub 255.255.255.0.</div>
  </div>`;
}
window.updateSubnet=function(){
  const ip=document.getElementById("snip").value.trim();
  const cidrInp=document.getElementById("sncidr").value.trim();
  let cidr=parseInt(cidrInp);
  if(cidrInp.includes(".")){
    // dot notation mask
    const parts=cidrInp.split(".").map(Number);
    cidr=parts.reduce((acc,o)=>acc+o.toString(2).split("1").length-1,0);
  }
  const out=document.getElementById("snout");
  if(!validIp(ip)||isNaN(cidr)||cidr<0||cidr>32){out.innerHTML='<span style="color:var(--bad)">Nieprawidłowy adres lub CIDR</span>';return;}
  const ipN=ipToNum(ip);
  const maskN=cidr===0?0:(0xFFFFFFFF<<(32-cidr))>>>0;
  const networkN=(ipN&maskN)>>>0;
  const broadcastN=(networkN|(~maskN>>>0))>>>0;
  const total=cidr===32?1:(cidr===31?2:Math.pow(2,32-cidr));
  const usable=cidr>=31?total:total-2;
  const firstHost=cidr>=31?networkN:networkN+1;
  const lastHost=cidr>=31?broadcastN:broadcastN-1;
  const cls=ipN<0x80000000?"A":ipN<0xC0000000?"B":ipN<0xE0000000?"C":ipN<0xF0000000?"D (multicast)":"E";
  const priv=isPrivateIp(ipN);
  out.innerHTML=`
    <div class="row"><span>Adres sieci:</span><b>${numToIp(networkN)}/${cidr}</b></div>
    <div class="row"><span>Maska podsieci:</span><b>${numToIp(maskN)}</b></div>
    <div class="row"><span>Maska binarnie:</span><span style="font-size:11px">${maskToBin(maskN)}</span></div>
    <div class="row"><span>Broadcast:</span><b>${numToIp(broadcastN)}</b></div>
    <div class="row"><span>Pierwszy host:</span><b>${numToIp(firstHost)}</b></div>
    <div class="row"><span>Ostatni host:</span><b>${numToIp(lastHost)}</b></div>
    <div class="row"><span>Liczba adresów:</span><b>${total}</b></div>
    <div class="row"><span>Liczba hostów:</span><b>${Math.max(0,usable)}</b></div>
    <div class="row"><span>Klasa:</span><b>${cls}</b> ${priv?'<span class="chip">prywatny</span>':''}</div>
  `;
};
function validIp(ip){const p=ip.split(".");if(p.length!==4)return false;return p.every(o=>/^\d+$/.test(o)&&+o>=0&&+o<=255);}
function ipToNum(ip){return ip.split(".").reduce((a,o)=>(a<<8)+ +o,0)>>>0;}
function numToIp(n){return [(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255].join(".");}
function maskToBin(m){return [(m>>>24)&255,(m>>>16)&255,(m>>>8)&255,m&255].map(o=>o.toString(2).padStart(8,"0")).join(".");}
function isPrivateIp(n){return (n>=0x0A000000&&n<=0x0AFFFFFF)||(n>=0xAC100000&&n<=0xAC1FFFFF)||(n>=0xC0A80000&&n<=0xC0A8FFFF);}

function subnetGenHtml(){
  return `<div class="card"><h2>Generator zadań IP</h2>

}
window.generateSubnetQ=function(){
  const area=document.getElementById("subq-area");
  const taskType=Math.floor(Math.random()*4);
  const baseIPs=["192.168.1.0","10.0.0.0","172.16.0.0","192.168.5.0","10.10.10.0","172.20.0.0"];
  const base=baseIPs[Math.floor(Math.random()*baseIPs.length)];
  let q,answer,explanation;
  if(taskType===0){
    // Subnet from /24 to N subnets
    const n=[2,4,8,16,32][Math.floor(Math.random()*5)];
    const newCidr=24+Math.log2(n);
    const mask=numToIp((0xFFFFFFFF<<(32-newCidr))>>>0);
    q=`Sieć ${base}/24 należy podzielić na <b>${n} równych podsieci</b>. Jaką maskę zastosować?`;
    answer=`/${newCidr} czyli ${mask}`;
    explanation=`${n} podsieci = 2^${Math.log2(n)} → ${Math.log2(n)} dodatkowe bity → /24 + ${Math.log2(n)} = /${newCidr} = ${mask}`;
  } else if(taskType===1){
    // Hosts in /N
    const cidr=20+Math.floor(Math.random()*10);
    const hosts=cidr>=31?(cidr===31?2:1):Math.pow(2,32-cidr)-2;
    q=`Ile hostów można zaadresować w sieci /${cidr}?`;
    answer=`${hosts}`;
    explanation=`/${cidr}: 2^(32-${cidr}) = ${Math.pow(2,32-cidr)} adresów - 2 (sieć i broadcast) = ${hosts} hostów.`;
  } else if(taskType===2){
    // Broadcast for IP/cidr
    const cidr=24+Math.floor(Math.random()*5);
    const ipN=ipToNum(base);
    const maskN=(0xFFFFFFFF<<(32-cidr))>>>0;
    const netN=(ipN&maskN)>>>0;
    const bcastN=(netN|(~maskN>>>0))>>>0;
    q=`Adres komputera: <b>${base}</b> z maską <b>/${cidr}</b>. Jaki jest adres rozgłoszeniowy (broadcast)?`;
    answer=numToIp(bcastN);
    explanation=`Maska /${cidr} → blok ${Math.pow(2,32-cidr)} adresów. Sieć: ${numToIp(netN)}, broadcast: ${numToIp(bcastN)} (ostatni adres w bloku).`;
  } else {
    // Network address
    const cidr=20+Math.floor(Math.random()*10);
    const offset=Math.floor(Math.random()*Math.min(254,Math.pow(2,32-cidr)));
    const ipN=(ipToNum(base)+offset)>>>0;
    const maskN=cidr===0?0:(0xFFFFFFFF<<(32-cidr))>>>0;
    const netN=(ipN&maskN)>>>0;
    q=`Adres komputera: <b>${numToIp(ipN)}</b> z maską <b>/${cidr}</b>. Jaki jest adres podsieci?`;
    answer=numToIp(netN)+"/"+cidr;
    explanation=`Adres sieci = IP AND maska. ${numToIp(ipN)} AND ${numToIp(maskN)} = ${numToIp(netN)}.`;
  }
  area.innerHTML=`<div class="q-text">${q}</div>
    <input id="subq-input" placeholder="Twoja odpowiedź" style="padding:8px;border:1px solid var(--border);border-radius:4px;width:300px;font:inherit;font-family:Menlo,monospace">
    <button class="btn" onclick="checkSubnetQ('${answer.replace(/'/g,"\\'")}','${explanation.replace(/'/g,"\\'")}')">Sprawdź</button>
    <div id="subq-res" style="margin-top:12px"></div>`;
};
window.checkSubnetQ=function(answer,explanation){
  const inp=document.getElementById("subq-input").value.trim();
  const res=document.getElementById("subq-res");
  const correct=normalizeAns(inp)===normalizeAns(answer);
  res.innerHTML=`<div class="explanation" style="border-left-color:${correct?'var(--good)':'var(--bad)'}">
    <b style="color:${correct?'var(--good)':'var(--bad)'}">${correct?'✓ Poprawnie':'✗ Niepoprawnie'}</b> ·
    Prawidłowa odp: <b>${answer}</b><br>${explanation}
  </div>`;
};
function normalizeAns(s){return s.toLowerCase().replace(/\s+/g,"").replace(/^\//,"");}
