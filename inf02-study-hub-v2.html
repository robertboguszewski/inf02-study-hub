<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<title>INF.02 Study Hub v2</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root{color-scheme:light;--bg:#f7f8fb;--card:#fff;--text:#1a1d24;--muted:#5a6473;--border:#e3e6ec;--accent:#2f6ef0;--accent2:#1e4ec0;--good:#1f9d55;--bad:#c92e2e;--warn:#d97706;--shadow:0 1px 2px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.05)}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
body{display:flex;min-height:100vh}
nav{width:200px;background:var(--card);border-right:1px solid var(--border);padding:16px 0;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
nav h1{font-size:14px;margin:0 16px 16px;color:var(--accent2);letter-spacing:.5px}
nav h1 small{display:block;font-weight:400;color:var(--muted);font-size:11px;letter-spacing:0;margin-top:2px}
nav button{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:none;border:0;padding:10px 16px;cursor:pointer;color:var(--text);font:inherit;border-left:3px solid transparent}
nav button:hover{background:#f1f4f9}
nav button.active{background:#eef3fc;border-left-color:var(--accent);color:var(--accent2);font-weight:600}
nav button .ico{width:18px;text-align:center;font-size:14px}
nav .footer{position:absolute;bottom:0;left:0;right:0;padding:12px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);background:var(--card)}
main{flex:1;padding:24px 32px;max-width:1100px;margin:0 auto;width:100%}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.row{display:flex;gap:16px;flex-wrap:wrap}
.row>.card{flex:1;min-width:240px;margin-bottom:0}
h2{margin:0 0 12px;font-size:18px}
h3{margin:0 0 8px;font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.btn{display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#fff;border:0;border-radius:6px;padding:8px 14px;font:inherit;font-weight:500;cursor:pointer;transition:background .15s}
.btn:hover{background:var(--accent2)}
.btn.ghost{background:transparent;color:var(--accent);border:1px solid var(--border)}
.btn.ghost:hover{background:#f1f4f9}
.btn.danger{background:var(--bad)}
.btn.success{background:var(--good)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.bigstat{font-size:32px;font-weight:700;color:var(--accent2);line-height:1}
.bigstat small{font-size:13px;font-weight:400;color:var(--muted);display:block;margin-top:4px}
.bar{height:8px;background:#eef0f5;border-radius:99px;overflow:hidden;margin:6px 0}
.bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#5b8def);border-radius:99px;transition:width .4s}
.area-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid #f0f2f6}
.area-row:last-child{border-bottom:0}
.area-row .name{flex:1;font-weight:500}
.area-row .count{color:var(--muted);font-size:12px;min-width:80px;text-align:right}
.chip{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;background:#eef3fc;color:var(--accent2)}
.chip.B{background:#fef3c7;color:#92400e}
.chip.O{background:#dbeafe;color:#1e40af}
.chip.N{background:#dcfce7;color:#166534}
.chip.P{background:#fce7f3;color:#9d174d}
.chip.D{background:#fee2e2;color:#991b1b}
.chip.L{background:#e0e7ff;color:#3730a3}
.chip.W{background:#cffafe;color:#155e75}
.chip.area6{background:#f3e8ff;color:#6b21a8}
.chip.V{background:#fef9c3;color:#854d0e}
.chip.Z{background:#fed7aa;color:#9a3412}
.chip.R{background:#d1fae5;color:#065f46}
.q-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:12px}
.q-card .q-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:12px;color:var(--muted)}
.q-card .q-text{font-size:15px;margin-bottom:14px;line-height:1.5}
.q-card .opt{display:block;padding:10px 14px;border:1px solid var(--border);border-radius:6px;margin-bottom:6px;cursor:pointer;transition:all .12s;background:#fafbfd}
.q-card .opt:hover{border-color:var(--accent);background:#f1f4f9}
.q-card .opt.selected{border-color:var(--accent);background:#eef3fc}
.q-card .opt.correct{border-color:var(--good);background:#dcfce7;color:#14532d}
.q-card .opt.wrong{border-color:var(--bad);background:#fee2e2;color:#7f1d1d}
.q-card .opt.disabled{cursor:default}
.q-card .explanation{margin-top:14px;padding:12px;background:#f8fafd;border-left:3px solid var(--accent);border-radius:4px;font-size:13px;color:#37424f}
.timer{position:fixed;top:16px;right:24px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-weight:600;font-variant-numeric:tabular-nums;box-shadow:var(--shadow);z-index:100}
.timer.warn{color:var(--warn);border-color:var(--warn)}
.timer.crit{color:var(--bad);border-color:var(--bad);animation:pulse 1s infinite}
@keyframes pulse{50%{background:#fee2e2}}
.kbd{display:inline-block;padding:1px 5px;background:#f1f4f9;border:1px solid var(--border);border-radius:3px;font:11px Menlo,monospace}
.subnet-grid{display:grid;grid-template-columns:auto 1fr;gap:8px 12px;align-items:center;font-size:13px}
.subnet-grid label{color:var(--muted);font-weight:500}
.subnet-grid input,.subnet-grid select{padding:6px 8px;border:1px solid var(--border);border-radius:4px;font:inherit}
.subnet-out{background:#f8fafd;border-radius:6px;padding:12px;margin-top:12px;font:13px Menlo,monospace}
.subnet-out .row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px dashed #e3e6ec;flex-wrap:nowrap;gap:0}
.subnet-out .row:last-child{border:0}
.subnet-out .row b{color:var(--accent2)}
.tabbar{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px}
.tabbar button{background:none;border:0;padding:10px 14px;cursor:pointer;font:inherit;color:var(--muted);border-bottom:2px solid transparent;font-weight:500}
.tabbar button.active{color:var(--accent2);border-bottom-color:var(--accent)}
.empty{padding:40px;text-align:center;color:var(--muted)}
.flag{display:inline-block;padding:2px 6px;border-radius:3px;font-size:11px;font-weight:600;margin-left:6px}
.flag.box1{background:#fee2e2;color:#991b1b}
.flag.box2{background:#fef3c7;color:#92400e}
.flag.box3{background:#dbeafe;color:#1e40af}
.flag.box4{background:#dcfce7;color:#166534}
.flag.box5{background:#e0e7ff;color:#3730a3}
.weekplan{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:8px}
.weekplan .w{background:#f8fafd;border:1px solid var(--border);border-radius:6px;padding:10px;font-size:12px;text-align:center}
.weekplan .w.now{background:#eef3fc;border-color:var(--accent)}
.weekplan .w b{display:block;color:var(--accent2);font-size:11px}
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.toolbar .spacer{flex:1}
select.areafilter{padding:6px 10px;border:1px solid var(--border);border-radius:6px;font:inherit;background:#fff}
.note{font-size:12px;color:var(--muted);margin-top:8px}
@media(max-width:780px){
  body{flex-direction:column}
  nav{width:100%;height:auto;position:relative;display:flex;flex-wrap:wrap;padding:8px}
  nav h1{width:100%;margin:0 8px 8px}
  nav button{width:auto;padding:6px 10px;border-left:0;border-bottom:2px solid transparent;font-size:12px}
  nav button.active{border-left:0;border-bottom-color:var(--accent)}
  nav .footer{position:relative;width:100%;border-top:0}
  main{padding:16px}
  .timer{top:8px;right:8px}
}

/* ============ UX MODULES STYLES ============ */

.ux-modal-overlay{
  position:fixed;inset:0;background:rgba(15,20,30,.55);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;padding:16px;
  opacity:0;animation:ux-fade-in .25s cubic-bezier(.2,.8,.2,1) forwards;
}
.ux-modal-overlay.closing{animation:ux-fade-out .2s cubic-bezier(.4,0,1,1) forwards}
@keyframes ux-fade-in{to{opacity:1}}
@keyframes ux-fade-out{to{opacity:0}}
.ux-modal{
  background:var(--card);border-radius:12px;
  width:100%;max-width:480px;padding:32px;
  box-shadow:0 10px 40px rgba(0,0,0,.18),0 2px 8px rgba(0,0,0,.06);
  transform:translateY(8px) scale(.98);
  animation:ux-pop .35s cubic-bezier(.2,.8,.2,1) forwards;
}
@keyframes ux-pop{to{transform:translateY(0) scale(1)}}
.ux-modal h2{margin:0 0 8px;font-size:22px;color:var(--text)}
.ux-modal .ux-sub{color:var(--muted);font-size:13px;margin:0 0 24px}
.ux-steps{display:flex;gap:6px;margin-bottom:24px}
.ux-step-pill{flex:1;height:4px;border-radius:99px;background:#eef0f5;transition:background .25s}
.ux-step-pill.active{background:var(--accent)}
.ux-step-pill.done{background:var(--good)}
.ux-radio{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;border:1px solid var(--border);border-radius:8px;
  margin-bottom:8px;cursor:pointer;transition:all .15s cubic-bezier(.2,.8,.2,1);
  min-height:56px;background:#fafbfd;
}
.ux-radio:hover{border-color:var(--accent);background:#f1f4f9}
.ux-radio input{margin:0;accent-color:var(--accent);width:18px;height:18px}
.ux-radio.checked{border-color:var(--accent);background:#eef3fc}
.ux-radio .ux-r-title{font-weight:600;display:block;margin-bottom:2px}
.ux-radio .ux-r-desc{color:var(--muted);font-size:12px}
.ux-slider-wrap{padding:8px 0 4px}
.ux-slider-val{
  display:flex;justify-content:space-between;align-items:baseline;
  margin-bottom:8px;
}
.ux-slider-val b{font-size:32px;color:var(--accent2);font-weight:700}
.ux-slider-val span{color:var(--muted);font-size:12px}
.ux-slider{
  -webkit-appearance:none;appearance:none;width:100%;height:6px;
  border-radius:99px;background:#eef0f5;outline:none;
}
.ux-slider::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;width:22px;height:22px;
  border-radius:50%;background:var(--accent);cursor:pointer;
  box-shadow:0 2px 6px rgba(47,110,240,.35);
  transition:transform .15s;
}
.ux-slider::-webkit-slider-thumb:hover{transform:scale(1.15)}
.ux-slider::-moz-range-thumb{
  width:22px;height:22px;border-radius:50%;background:var(--accent);
  cursor:pointer;border:0;box-shadow:0 2px 6px rgba(47,110,240,.35);
}
.ux-slider-marks{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:6px}
.ux-modal .ux-actions{
  display:flex;justify-content:space-between;gap:8px;margin-top:28px;
}
.ux-modal .ux-actions .btn{min-height:48px;padding:0 20px}
.ux-diag-list{margin:8px 0 0;padding:0;list-style:none}
.ux-diag-list li{
  padding:8px 0;color:var(--muted);font-size:13px;
  display:flex;align-items:center;gap:8px;
}
.ux-diag-list li::before{content:"✓";color:var(--good);font-weight:700}
@media(max-width:780px){
  .ux-modal{padding:24px 20px;border-radius:14px 14px 0 0;align-self:flex-end;max-width:100%}
  .ux-modal-overlay{align-items:flex-end}
  .ux-modal h2{font-size:20px}
}


.ux-streak{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:99px;
  background:linear-gradient(135deg,#fff7ed,#fed7aa);
  border:1px solid #fdba74;color:#9a3412;
  font-weight:700;font-size:13px;cursor:pointer;
  position:relative;user-select:none;
  transition:transform .15s cubic-bezier(.2,.8,.2,1);
  min-height:32px;
}
.ux-streak:hover{transform:translateY(-1px)}
.ux-streak.cold{
  background:#f1f4f9;border-color:var(--border);color:var(--muted);
}
.ux-streak .ux-fire{font-size:16px;line-height:1}
.ux-streak.bumped .ux-fire{animation:ux-fire-bump .6s cubic-bezier(.2,.8,.2,1)}
@keyframes ux-fire-bump{
  0%{transform:scale(1)}
  30%{transform:scale(1.4) rotate(-8deg)}
  60%{transform:scale(1.15) rotate(6deg)}
  100%{transform:scale(1)}
}
.ux-streak-tip{
  position:absolute;top:calc(100% + 8px);right:0;
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:14px;box-shadow:var(--shadow);min-width:240px;z-index:200;
  font-weight:400;color:var(--text);font-size:13px;
  opacity:0;pointer-events:none;transform:translateY(-4px);
  transition:opacity .2s,transform .2s;
}
.ux-streak-tip.open{opacity:1;pointer-events:auto;transform:translateY(0)}
.ux-streak-tip h4{margin:0 0 6px;font-size:13px;color:var(--accent2)}
.ux-streak-tip p{margin:0 0 10px;color:var(--muted);font-size:12px}
.ux-streak-tip .btn{font-size:12px;padding:6px 10px;min-height:36px;width:100%;justify-content:center}
.ux-streak-nav-wrap{padding:0 16px 8px}
@media(max-width:780px){
  .ux-streak-tip{right:auto;left:0}
}


.ux-toast-stack{
  position:fixed;bottom:24px;right:24px;z-index:1100;
  display:flex;flex-direction:column;gap:8px;
  pointer-events:none;
}
.ux-toast{
  background:var(--card);border:1px solid var(--border);
  border-left:4px solid var(--good);border-radius:10px;
  padding:14px 16px;min-width:280px;max-width:340px;
  box-shadow:0 8px 24px rgba(0,0,0,.12),0 2px 6px rgba(0,0,0,.06);
  pointer-events:auto;
  transform:translateX(120%);opacity:0;
  animation:ux-toast-in .3s cubic-bezier(.2,.8,.2,1) forwards;
}
.ux-toast.out{animation:ux-toast-out .25s cubic-bezier(.4,0,1,1) forwards}
@keyframes ux-toast-in{to{transform:translateX(0);opacity:1}}
@keyframes ux-toast-out{to{transform:translateX(120%);opacity:0}}
.ux-toast-head{display:flex;gap:10px;align-items:center;margin-bottom:6px}
.ux-toast-ico{
  font-size:24px;line-height:1;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.15));
}
.ux-toast-title{font-weight:700;font-size:14px;color:var(--text);flex:1}
.ux-toast-sub{font-size:12px;color:var(--muted);margin-bottom:8px}
.ux-toast-bar{height:3px;background:#eef0f5;border-radius:99px;overflow:hidden}
.ux-toast-bar>span{
  display:block;height:100%;background:var(--good);width:100%;
  transform-origin:right;
  animation:ux-toast-bar 4s linear forwards;
}
@keyframes ux-toast-bar{to{transform:scaleX(0)}}

.ux-ach-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:12px;
}
.ux-ach-card{
  background:#fafbfd;border:1px solid var(--border);border-radius:8px;
  padding:14px 10px;text-align:center;
  transition:all .15s cubic-bezier(.2,.8,.2,1);
  position:relative;overflow:hidden;
}
.ux-ach-card.locked{opacity:.4;filter:grayscale(.8)}
.ux-ach-card.unlocked{
  background:linear-gradient(135deg,#fffbeb,#fef3c7);
  border-color:#fbbf24;
}
.ux-ach-card .ux-ach-ico{font-size:32px;margin-bottom:4px;line-height:1}
.ux-ach-card .ux-ach-name{font-size:12px;font-weight:600;color:var(--text);line-height:1.3}
.ux-ach-card .ux-ach-desc{font-size:10px;color:var(--muted);margin-top:2px}
.ux-ach-card.unlocked::after{
  content:"✓";position:absolute;top:6px;right:8px;
  color:var(--good);font-weight:700;font-size:14px;
}
@media(max-width:780px){
  .ux-ach-grid{grid-template-columns:repeat(3,1fr)}
  .ux-toast-stack{left:16px;right:16px;bottom:84px}
  .ux-toast{min-width:0;max-width:100%}
}


/* Domyślnie — większe tap targets na całej apce (Material 48px > Apple 44px) */
.btn{min-height:44px}
.q-card .opt{padding:14px 16px;min-height:56px;display:flex;align-items:center}

@media(max-width:780px){
  .btn{min-height:48px;padding:10px 18px}
  .q-card .opt{padding:14px 16px;min-height:56px}

  /* Timer: sticky zamiast fixed (nie zachodzi na "Przerwij") */
  .timer{
    position:sticky !important;top:0 !important;right:auto !important;left:0;
    width:100%;border-radius:0;border-left:0;border-right:0;border-top:0;
    text-align:center;z-index:50;
  }

  /* Sidebar nav -> bottom-nav */
  body{flex-direction:column;padding-bottom:72px}
  nav{
    position:fixed !important;bottom:0;left:0;right:0;top:auto !important;
    width:100% !important;height:64px !important;
    display:flex !important;justify-content:space-around;align-items:stretch;
    padding:8px !important;
    background:var(--card);
    border-top:1px solid var(--border);border-right:0 !important;
    box-shadow:0 -2px 12px rgba(0,0,0,.06);
    z-index:90;flex-wrap:nowrap !important;
  }
  nav h1, nav .footer, nav .ux-streak-nav-wrap{display:none !important}
  nav button{
    flex:1;min-width:0;
    display:flex !important;flex-direction:column;
    align-items:center;justify-content:center;
    gap:2px !important;padding:4px !important;
    border-left:0 !important;border-bottom:0 !important;
    font-size:10px !important;color:var(--muted);
    min-height:48px;
  }
  nav button.active{
    background:transparent !important;color:var(--accent2) !important;
    border-bottom:0 !important;
  }
  nav button.active .ico{transform:translateY(-1px)}
  nav button .ico{font-size:20px !important;width:auto !important}
  nav button .ux-label{display:block;line-height:1}
  /* Settings -> w "More" — chowamy w bottom-nav */
  nav button[data-view="settings"]{display:none !important}
  nav button[data-view="more"]{display:flex !important}
}
@media(min-width:781px){
  nav button[data-view="more"]{display:none !important}
}

/* Drawer "More" z Settings + Achievements */
.ux-more-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1050;
  display:none;align-items:flex-end;
}
.ux-more-overlay.open{display:flex;animation:ux-fade-in .2s forwards}
.ux-more-sheet{
  background:var(--card);width:100%;border-radius:14px 14px 0 0;
  padding:20px;transform:translateY(100%);
  animation:ux-sheet-up .3s cubic-bezier(.2,.8,.2,1) forwards;
}
@keyframes ux-sheet-up{to{transform:translateY(0)}}
.ux-more-sheet h3{margin:0 0 12px}
.ux-more-sheet button{
  width:100%;background:none;border:0;border-bottom:1px solid var(--border);
  text-align:left;padding:14px 4px;font:inherit;color:var(--text);
  display:flex;gap:12px;align-items:center;min-height:48px;cursor:pointer;
}
.ux-more-sheet button:last-child{border-bottom:0}


@keyframes ux-shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-4px)}
  40%{transform:translateX(4px)}
  60%{transform:translateX(-3px)}
  80%{transform:translateX(3px)}
}
.ux-shake{animation:ux-shake .3s cubic-bezier(.36,.07,.19,.97)}

@keyframes ux-pulse-good{
  0%{box-shadow:0 0 0 0 rgba(31,157,85,.45)}
  100%{box-shadow:0 0 0 12px rgba(31,157,85,0)}
}
.ux-pulse-good{animation:ux-pulse-good .6s cubic-bezier(.2,.8,.2,1)}

#ux-confetti-canvas{
  position:fixed;inset:0;pointer-events:none;z-index:1200;
}
.ux-countup{
  font-variant-numeric:tabular-nums;
  display:inline-block;
}

/* ============ END UX STYLES ============ */
</style>
</head>
<body>

<nav>
  <h1>INF.02 Study Hub<small>v2 · 230 pytań · sesja lato 2026</small></h1>
  <div id="ux-streak-host" style="margin:0 16px 12px;font-size:13px;color:var(--muted)"></div>
  <button class="active" data-view="dash"><span class="ico">📊</span> Dashboard</button>
  <button data-view="quiz"><span class="ico">📝</span> Quiz egzaminacyjny</button>
  <button data-view="srs"><span class="ico">🔁</span> Fiszki SR</button>
  <button data-view="topics"><span class="ico">📚</span> Nauka tematyczna</button>
  <button data-view="practice"><span class="ico">🛠️</span> Symulator praktyczny</button>
  <button data-view="diagnosis"><span class="ico">🎯</span> Diagnoza</button>
  <button data-view="review"><span class="ico">📈</span> Naucz się słabych</button>
  <button data-view="achievements"><span class="ico">🏆</span> Osiągnięcia</button>
  <button data-view="settings"><span class="ico">⚙️</span> Postępy / Eksport</button>

<script>
// ============ ADAPTIVE ENGINE (Phase 1C) ============
/* ============================================================================
 * INF.02 Adaptive Learning Engine v2
 * ----------------------------------------------------------------------------
 * Vanilla JS, ES2017+, no external deps. Drop-in module for inf02-study-hub.
 * Modules:
 *   1) Diagnostic calibration       (selectDiagnosticQuestions)
 *   2) Weak-area weighted selection (selectQuizQuestions)
 *   3) SM-2 + 4-rating scheduler    (rateCard)            [Wozniak 1990]
 *   4) Free recall + tolerant match (renderFillInQuestion, matchAnswer)
 *   5) Worked-example fading        (renderWorkedExample) [Sweller 2006]
 *   6) Knowledge model + dashboard  (updateKnowledge, getKnowledgeReport)
 * ==========================================================================*/

(function (global) {
  'use strict';

  // ---------------------------------------------------------------------------
  // STATE — persisted via localStorage under a single key. Pure helpers below
  // accept/return state to keep the algorithmic core testable.
  // ---------------------------------------------------------------------------
  const STORAGE_KEY = 'inf02_adaptive_state_v2';
  const AREAS = ['B', 'O', 'D', 'S', 'U']; // Bezpieczeństwo, Okablowanie, Diagnostyka, Sieci, Usługi
  const ALPHA = 0.7; // Bayesian smoothing for knowledge updates

  const defaultState = () => ({
    diagnosed: false,
    knowledge: AREAS.reduce((acc, a) => (acc[a] = 0.5, acc), {}),
    cards: {},          // id -> {ease, interval, reps, lapses, due, learningStep, area, successStreak}
    history: [],        // {id, ts, correct, area}
    workedExampleProgress: {}, // topic -> count of successful applications
  });

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return defaultState();
      return Object.assign(defaultState(), JSON.parse(raw));
    } catch (e) { return defaultState(); }
  }

  function saveState(state) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
  }

  let state = loadState();
// UX init (no-op if not loaded)
if(window.UX){if(UX.streak&&UX.streak.init)UX.streak.init();if(UX.achievements&&UX.achievements.init)UX.achievements.init();if(UX.fx&&UX.fx.init)UX.fx.init();if(UX.onboarding&&UX.onboarding.maybeShow)UX.onboarding.maybeShow();}

  // ---------------------------------------------------------------------------
  // 1) DIAGNOSTIC CALIBRATION
  // ---------------------------------------------------------------------------

  /**
   * Pick a calibration set: 1 easy + 1 medium + 1 hard per area (cap at 12).
   * @param {Array<{id:string,area:string,difficulty:'easy'|'medium'|'hard'}>} pool
   * @param {number} [maxQuestions=12]
   * @returns {Array} ordered diagnostic question list
   */
  function selectDiagnosticQuestions(pool, maxQuestions = 12) {
    const out = [];
    AREAS.forEach(area => {
      ['easy', 'medium', 'hard'].forEach(diff => {
        const candidates = pool.filter(q => q.area === area && q.difficulty === diff);
        if (candidates.length) {
          out.push(candidates[Math.floor(Math.random() * candidates.length)]);
        }
      });
    });
    // Shuffle so user does not see "easy first" pattern (reduces ceiling artefacts)
    for (let i = out.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [out[i], out[j]] = [out[j], out[i]];
    }
    return out.slice(0, maxQuestions);
  }

  /**
   * Apply diagnostic results. Each area's prior knowledge becomes
   * (correct / answered) capped to [0.1, 0.9] so SR has room to move.
   * @param {Array<{area:string,correct:boolean}>} results
   */
  function markDiagnosisComplete(results) {
    const tally = {};
    results.forEach(r => {
      tally[r.area] = tally[r.area] || { c: 0, n: 0 };
      tally[r.area].n += 1;
      if (r.correct) tally[r.area].c += 1;
    });
    AREAS.forEach(a => {
      if (tally[a]) {
        const p = tally[a].c / tally[a].n;
        state.knowledge[a] = Math.max(0.1, Math.min(0.9, p));
      }
    });
    state.diagnosed = true;
    saveState(state);
  }

  // ---------------------------------------------------------------------------
  // 2) WEAK-AREA WEIGHTED SELECTION
  // ---------------------------------------------------------------------------

  /**
   * Weighted draw of n questions. 70% of slots use weight (1 - knowledge[area])^2
   * (favour weak areas), 30% use a uniform draw (rehearse strong areas to prevent
   * forgetting). Skips cards answered correctly 3+ times in last 7 days.
   * @param {number} n
   * @param {Array<{id:string,area:string}>} pool
   * @returns {Array} selected questions
   */
  function selectQuizQuestions(n, pool) {
    const weakSlots = Math.round(n * 0.7);
    const strongSlots = n - weakSlots;
    const filtered = pool.filter(q => !isRecentlyMastered(q.id));
    if (!filtered.length) return [];

    const weights = filtered.map(q => {
      const k = state.knowledge[q.area] !== undefined ? state.knowledge[q.area] : 0.5;
      return Math.pow(1 - k, 2) + 0.01; // floor to avoid 0 weight
    });

    const picked = [];
    const seen = new Set();
    for (let i = 0; i < weakSlots && picked.length < filtered.length; i++) {
      const idx = weightedIndex(weights, seen);
      if (idx >= 0) { picked.push(filtered[idx]); seen.add(idx); }
    }
    for (let i = 0; i < strongSlots && picked.length < filtered.length; i++) {
      let idx;
      do { idx = Math.floor(Math.random() * filtered.length); } while (seen.has(idx));
      picked.push(filtered[idx]); seen.add(idx);
    }
    return picked;
  }

  function weightedIndex(weights, exclude) {
    let total = 0;
    for (let i = 0; i < weights.length; i++) if (!exclude.has(i)) total += weights[i];
    if (total <= 0) return -1;
    let r = Math.random() * total;
    for (let i = 0; i < weights.length; i++) {
      if (exclude.has(i)) continue;
      r -= weights[i];
      if (r <= 0) return i;
    }
    return -1;
  }

  function isRecentlyMastered(id) {
    const weekAgo = Date.now() - 7 * 24 * 3600 * 1000;
    const recent = state.history.filter(h => h.id === id && h.ts >= weekAgo);
    const wins = recent.filter(h => h.correct).length;
    return wins >= 3;
  }

  // ---------------------------------------------------------------------------
  // 3) SM-2 WITH 4-RATING + GENTLE LAPSE
  // ---------------------------------------------------------------------------
  // Based on Wozniak 1990 (SuperMemo 2) with Anki-style 4-button mapping.
  // Lapse handling softened per Ye 2023 (FSRS) — relapse multiplies interval by
  // 0.2 instead of resetting to box 1, which preserves morale and partial recall.
  // ---------------------------------------------------------------------------

  const RATING = { AGAIN: 1, HARD: 2, GOOD: 3, EASY: 4 };
  const LEARNING_STEPS_MIN = [1, 10, 60 * 24, 60 * 24 * 3]; // 1m, 10m, 1d, 3d

  /**
   * Apply a rating to a card; returns the updated card (does not mutate input).
   * @param {object} card existing or undefined
   * @param {number} rating 1..4
   * @param {string} area area code (for knowledge update)
   * @returns {object} new card state
   */
  function rateCard(card, rating, area) {
    const now = Date.now();
    const c = card ? Object.assign({}, card) : {
      ease: 2.5, interval: 0, reps: 0, lapses: 0, due: now,
      learningStep: 0, area: area, successStreak: 0,
    };

    // ----- Learning phase: graduate through 4 timed steps before SR proper.
    if (c.reps < LEARNING_STEPS_MIN.length) {
      if (rating === RATING.AGAIN) {
        c.learningStep = 0;
        c.due = now + LEARNING_STEPS_MIN[0] * 60 * 1000;
        c.successStreak = 0;
        return c;
      }
      const step = Math.min(c.reps + (rating === RATING.EASY ? 2 : 1), LEARNING_STEPS_MIN.length - 1);
      c.reps = step + 1;
      c.learningStep = step;
      c.due = now + LEARNING_STEPS_MIN[step] * 60 * 1000;
      c.interval = LEARNING_STEPS_MIN[step] / (60 * 24); // in days
      c.successStreak += 1;
      return c;
    }

    // ----- Review phase (Wozniak SM-2): ease modulated, then interval scaled.
    if (rating === RATING.AGAIN) {
      c.lapses += 1;
      c.ease = Math.max(1.3, c.ease - 0.2);
      // Soft lapse: keep 20% of prior interval (min 10 minutes) instead of reset.
      const newIntervalDays = Math.max(0.007, c.interval * 0.2);
      c.interval = newIntervalDays;
      c.due = now + newIntervalDays * 24 * 3600 * 1000;
      c.successStreak = 0;
    } else {
      const easeDelta = rating === RATING.HARD ? -0.15 : rating === RATING.EASY ? +0.15 : 0;
      c.ease = Math.max(1.3, Math.min(3.0, c.ease + easeDelta));
      const factor = rating === RATING.HARD ? 1.2
                   : rating === RATING.GOOD ? c.ease
                   : c.ease * 1.3; // Easy
      const prev = c.interval > 0 ? c.interval : 1;
      c.interval = Math.max(1, prev * factor);
      c.due = now + c.interval * 24 * 3600 * 1000;
      c.reps += 1;
      c.successStreak += 1;
    }
    return c;
  }

  /**
   * High-level wrapper: persist rating, update knowledge, log history.
   * @param {string} id question id
   * @param {string} area
   * @param {number} rating 1..4
   */
  function recordAnswer(id, area, rating) {
    const updated = rateCard(state.cards[id], rating, area);
    state.cards[id] = updated;
    const correct = rating !== RATING.AGAIN;
    updateKnowledge(area, correct);
    state.history.push({ id: id, ts: Date.now(), correct: correct, area: area });
    if (state.history.length > 2000) state.history.splice(0, state.history.length - 2000);
    saveState(state);
    return updated;
  }

  // ---------------------------------------------------------------------------
  // 4) FREE-RECALL FILL-IN + TOLERANT MATCHER
  // ---------------------------------------------------------------------------

  /**
   * Normalise an answer for fuzzy comparison: lowercase, trim, strip Polish
   * diacritics, collapse separators (commas/semicolons/spaces), drop hex
   * leading zeros in IPv6 groups.
   * @param {string} s
   * @returns {string}
   */
  function normalizeAnswer(s) {
    if (s == null) return '';
    let out = String(s).toLowerCase().trim();
    const map = { 'ą':'a','ć':'c','ę':'e','ł':'l','ń':'n','ó':'o','ś':'s','ź':'z','ż':'z' };
    out = out.replace(/[ąćęłńóśźż]/g, ch => map[ch] || ch);
    out = out.replace(/[\s,;]+/g, ''); // remove separators between octets/groups
    // Collapse multiple :: in IPv6 to a single ::
    out = out.replace(/:{3,}/g, '::');
    return out;
  }

  /**
   * Tolerant equality check between user input and accepted answers.
   * @param {string} userInput
   * @param {string|string[]} accepted single string or array of variants
   * @returns {boolean}
   */
  function matchAnswer(userInput, accepted) {
    const u = normalizeAnswer(userInput);
    const variants = Array.isArray(accepted) ? accepted : [accepted];
    return variants.some(v => normalizeAnswer(v) === u);
  }

  /**
   * Render a fill-in question into a container element.
   * @param {object} q {id, area, prompt, answer, hint?}
   * @param {HTMLElement} container
   * @param {(correct:boolean,rating:number)=>void} onResolve callback
   */
  function renderFillInQuestion(q, container, onResolve) {
    container.innerHTML = '';
    const wrap = document.createElement('div');
    wrap.className = 'fillin-question';
    wrap.innerHTML =
      '<p class="prompt">' + escapeHtml(q.prompt) + '</p>' +
      '<input type="text" class="fillin-input" autocomplete="off" spellcheck="false" />' +
      '<button type="button" class="fillin-check">Sprawdź</button>' +
      '<div class="fillin-feedback" aria-live="polite"></div>';
    container.appendChild(wrap);
    const input = wrap.querySelector('.fillin-input');
    const btn = wrap.querySelector('.fillin-check');
    const fb = wrap.querySelector('.fillin-feedback');

    function submit() {
      const ok = matchAnswer(input.value, q.answer);
      fb.textContent = ok ? 'Dobrze!' : 'Poprawna odpowiedź: ' + (Array.isArray(q.answer) ? q.answer[0] : q.answer);
      fb.className = 'fillin-feedback ' + (ok ? 'ok' : 'bad');
      input.disabled = true; btn.disabled = true;
      // Free recall is harder than recognition — map to GOOD/AGAIN only.
      if (onResolve) onResolve(ok, ok ? RATING.GOOD : RATING.AGAIN);
    }
    btn.addEventListener('click', submit);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    })[c]);
  }

  // ---------------------------------------------------------------------------
  // 5) WORKED-EXAMPLE FADING (Sweller 2006: completion problems)
  // ---------------------------------------------------------------------------

  const WORKED_EXAMPLES = {
    // Subnetting /26 example: how many host addresses, derive from binary AND.
    'subnet_26': {
      title: 'Ile adresów daje maska /26?',
      steps: [
        { label: 'Krok 1: zapisz długość hosta',
          full: '32 - 26 = 6 bitów hosta',
          scaffold: '32 - 26 = ? bitów hosta',
          hint: 'Maska ma 26 jedynek; ile bitów zostaje?' },
        { label: 'Krok 2: licz adresy',
          full: '2^6 = 64 adresy w podsieci',
          scaffold: '2^? = ___ adresy',
          hint: 'Każdy bit hosta podwaja liczbę adresów.' },
        { label: 'Krok 3: odejmij sieć i broadcast',
          full: '64 - 2 = 62 adresy hostów użytecznych',
          scaffold: '64 - ? = ___ hostów',
          hint: 'Pierwszy adres = sieć, ostatni = broadcast.' },
      ],
      topic: 'subnetting',
    },
    // Worked example for /27 mask in dotted decimal via binary AND.
    'mask_decimal_27': {
      title: 'Maska dziesiętna dla /27',
      steps: [
        { label: 'Krok 1: pierwsze 24 bity',
          full: '255.255.255.???',
          scaffold: '255.255.255.???',
          hint: 'Pierwsze 3 oktety to same jedynki.' },
        { label: 'Krok 2: ostatni oktet binarnie',
          full: '11100000 (3 jedynki, 5 zer)',
          scaffold: '111????? — uzupełnij zera',
          hint: '/27 = 24 + 3 jedynki w 4. oktecie.' },
        { label: 'Krok 3: zamień na dziesiętne',
          full: '128+64+32 = 224 → 255.255.255.224',
          scaffold: '128+64+32 = ? → 255.255.255.???',
          hint: 'Dodaj wartości pozycyjne ustawionych bitów.' },
      ],
      topic: 'subnetting',
    },
  };

  /**
   * Pick a fading mode based on user's progress on a topic.
   * 0–2 successes: full; 3–5: scaffold; 6+: solo (no example shown).
   * @param {string} topic
   * @returns {'full'|'scaffold'|'hint'|'solo'}
   */
  function workedExampleMode(topic) {
    const c = state.workedExampleProgress[topic] || 0;
    if (c < 3) return 'full';
    if (c < 6) return 'scaffold';
    if (c < 9) return 'hint';
    return 'solo';
  }

  /**
   * Render a worked example with appropriate fading.
   * @param {string} key key into WORKED_EXAMPLES
   * @param {HTMLElement} container
   * @param {'full'|'scaffold'|'hint'|'solo'} [mode] override auto-mode
   */
  function renderWorkedExample(key, container, mode) {
    const ex = WORKED_EXAMPLES[key];
    if (!ex) { container.innerHTML = ''; return; }
    const m = mode || workedExampleMode(ex.topic);
    if (m === 'solo') { container.innerHTML = ''; return; }
    const parts = ['<div class="worked-example mode-' + m + '">',
                   '<h4>' + escapeHtml(ex.title) + '</h4>'];
    ex.steps.forEach(s => {
      const body = m === 'full' ? s.full
                 : m === 'scaffold' ? s.scaffold
                 : s.hint;
      parts.push('<div class="we-step"><strong>' + escapeHtml(s.label) + ':</strong> '
                 + escapeHtml(body) + '</div>');
    });
    parts.push('</div>');
    container.innerHTML = parts.join('');
  }

  /** Increment fading progress after a successful application of the topic. */
  function noteWorkedExampleSuccess(topic) {
    state.workedExampleProgress[topic] = (state.workedExampleProgress[topic] || 0) + 1;
    saveState(state);
  }

  // ---------------------------------------------------------------------------
  // 6) KNOWLEDGE MODEL + DASHBOARD
  // ---------------------------------------------------------------------------

  /**
   * Bayesian-style EWMA: knowledge[a] = α·old + (1-α)·correct.
   * @param {string} area
   * @param {boolean} correct
   */
  function updateKnowledge(area, correct) {
    if (state.knowledge[area] === undefined) state.knowledge[area] = 0.5;
    const old = state.knowledge[area];
    state.knowledge[area] = ALPHA * old + (1 - ALPHA) * (correct ? 1 : 0);
  }

  /**
   * Composite report for dashboard rendering.
   * readinessForExam = mean(knowledge) penalised by spread (low-area drag).
   * @returns {{areas:Object,weakest:string[],strongest:string[],readinessForExam:number}}
   */
  function getKnowledgeReport() {
    const areas = Object.assign({}, state.knowledge);
    const entries = Object.entries(areas);
    const sorted = entries.slice().sort((a, b) => a[1] - b[1]);
    const weakest = sorted.slice(0, 2).map(e => e[0]);
    const strongest = sorted.slice(-2).map(e => e[0]).reverse();
    const mean = entries.reduce((s, [, v]) => s + v, 0) / (entries.length || 1);
    const min = sorted.length ? sorted[0][1] : 0;
    // Drag readiness toward the weakest area — exam fails on missing topics.
    const readinessForExam = Math.max(0, Math.min(1, 0.6 * mean + 0.4 * min));
    return { areas, weakest, strongest, readinessForExam };
  }

  // ---------------------------------------------------------------------------
  // PUBLIC API
  // ---------------------------------------------------------------------------
  global.AdaptiveEngine = {
    // state
    getState: () => state,
    resetState: () => { state = defaultState(); saveState(state); },
    // diagnosis
    selectDiagnosticQuestions,
    markDiagnosisComplete,
    isDiagnosed: () => state.diagnosed,
    // selection
    selectQuizQuestions,
    // scheduling
    RATING,
    rateCard,
    recordAnswer,
    // free recall
    matchAnswer,
    normalizeAnswer,
    renderFillInQuestion,
    // worked examples
    renderWorkedExample,
    workedExampleMode,
    noteWorkedExampleSuccess,
    WORKED_EXAMPLES,
    // dashboard
    updateKnowledge,
    getKnowledgeReport,
    AREAS,
  };

  /* ============================================================================
   * INTEGRATION INTERFACE — how to wire this into inf02-study-hub.html v1
   * ----------------------------------------------------------------------------
   * 1. Include this file once:
   *      <script src="v2/adaptive-engine.js"><\/script>
   *
   * 2. ON FIRST LOAD — diagnostic gate:
   *      if (!AdaptiveEngine.isDiagnosed()) {
   *        const dq = AdaptiveEngine.selectDiagnosticQuestions(QUESTION_POOL);
   *        runQuiz(dq, results => AdaptiveEngine.markDiagnosisComplete(results));
   *      }
   *
   * 3. QUIZ MODE — replace the old random/Leitner picker:
   *      const qs = AdaptiveEngine.selectQuizQuestions(20, QUESTION_POOL);
   *
   * 4. ANSWER RATING — replace box +/- with 4 buttons. After each card:
   *      AdaptiveEngine.recordAnswer(q.id, q.area, AdaptiveEngine.RATING.GOOD);
   *    (use AGAIN | HARD | GOOD | EASY based on user click).
   *
   * 5. FREE-RECALL QUESTIONS — for q.type === 'fillin':
   *      AdaptiveEngine.renderFillInQuestion(q, mountEl, (correct, rating) => {
   *        AdaptiveEngine.recordAnswer(q.id, q.area, rating);
   *      });
   *    Question pool entries:
   *      { id:'mask27', area:'S', type:'fillin',
   *        prompt:'Podaj maskę dziesiętną dla /27',
   *        answer:'255.255.255.224' }
   *      { id:'ipv6shorten', area:'S', type:'fillin',
   *        prompt:'Skróć adres 2001:0db8:0000:0000:0000:ff00:0042:8329',
   *        answer:['2001:db8::ff00:42:8329'] }
   *
   * 6. WORKED EXAMPLES — before a subnet question render the example:
   *      AdaptiveEngine.renderWorkedExample('subnet_26', exampleMountEl);
   *    On correct answer: AdaptiveEngine.noteWorkedExampleSuccess('subnetting').
   *
   * 7. DASHBOARD — rebuild the progress panel from:
   *      const r = AdaptiveEngine.getKnowledgeReport();
   *      // r.areas.B / O / D / S / U  (0..1)
   *      // r.weakest, r.strongest, r.readinessForExam
   *
   * 8. DEBUG / RESET — expose a button calling AdaptiveEngine.resetState().
   *
   * State is auto-persisted to localStorage key `inf02_adaptive_state_v2` after
   * every recordAnswer / markDiagnosisComplete call. No manual save needed.
   * ==========================================================================*/
})(typeof window !== 'undefined' ? window : globalThis);

// ============ END ADAPTIVE ENGINE ============

// =============== STATE ===============
function chipClass(a){return a==="6"?"area6":a;}

  try{const old=localStorage.getItem("inf02_progress_v1");
    if(old && !localStorage.getItem(STORAGE_KEY)){localStorage.setItem(STORAGE_KEY,old);console.log("Migrated v1 → v2");}
  }catch(e){}
}
