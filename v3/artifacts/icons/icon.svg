<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="INF.02 Study Hub">
  <title>INF.02 Study Hub</title>
  <desc>Niebieska ikona aplikacji edukacyjnej INF.02 — accent #5EA9FF na ciemnym tle #0F1115</desc>

  <!-- background -->
  <rect width="512" height="512" rx="96" ry="96" fill="#0F1115"/>

  <!-- subtle inner border (grid feel) -->
  <rect x="40" y="40" width="432" height="432" rx="72" ry="72"
        fill="none" stroke="#2E3340" stroke-width="3"/>

  <!-- network/connection dots (2 nodes flanking the central I) -->
  <g fill="#5EA9FF">
    <circle cx="124" cy="172" r="22"/>
    <circle cx="388" cy="340" r="22"/>
  </g>

  <!-- connecting lines (network edges through central I) -->
  <g stroke="#5EA9FF" stroke-width="6" stroke-linecap="round" opacity="0.55" fill="none">
    <line x1="124" y1="172" x2="256" y2="256"/>
    <line x1="256" y1="256" x2="388" y2="340"/>
  </g>

  <!-- central capital "I" — minimalistic serif bar -->
  <g fill="#5EA9FF">
    <!-- top bar -->
    <rect x="176" y="140" width="160" height="32" rx="8"/>
    <!-- vertical stem -->
    <rect x="232" y="140" width="48" height="232" rx="8"/>
    <!-- bottom bar -->
    <rect x="176" y="340" width="160" height="32" rx="8"/>
  </g>

  <!-- ".02" suffix label baseline-aligned with I -->
  <g fill="#F2F4F7" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica Neue, Arial, sans-serif"
     font-weight="700" font-size="56" text-anchor="middle">
    <text x="256" y="448">INF.02</text>
  </g>
</svg>
