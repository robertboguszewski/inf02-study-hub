  INF.02 Study Hub — v2 UX MODULES
  ================================
  Author: Agent C (UX/UI Engineer)
  Pięć niezależnych, drop-in modułów do v2 live artifactu.
  Każdy moduł = <style> + (opcjonalnie) <template> + <script>.

<script id="ux-onboarding-js">
(function(){
  const M = (window.UX = window.UX || {});
  M.onboarding = {
    /**
     * Pokaż wizard, jeśli nie ma profilu i brak odpowiedzi.
     * Wywoływać po loadState() z v1.
     */
    maybeShow(){
      if(!window.state) return;
      const fresh = Object.keys(window.state.answered||{}).length === 0;
      if(fresh && !window.state.profile){ this.show(); }
    },
    show(){
      if(document.getElementById("ux-ob-overlay")) return;
      const tpl = document.getElementById("ux-onboarding-template");
      const node = tpl.content.cloneNode(true);
      document.body.appendChild(node);
      this._bind();
    },
    close(){
      const ov = document.getElementById("ux-ob-overlay");
      if(!ov) return;
      ov.classList.add("closing");
      setTimeout(()=>ov.remove(),200);
    },
    _state:{step:1,goal:"exam",dailyGoalMin:20},
    _bind(){
      const self=this;
      // Radio click — ładnie zaznacz
      document.querySelectorAll(".ux-radio input").forEach(r=>{
        r.addEventListener("change",e=>{
          self._state.goal = e.target.value;
          document.querySelectorAll(".ux-radio").forEach(el=>{
            el.classList.toggle("checked", el.querySelector("input").checked);
          });
        });
        if(r.checked) r.closest(".ux-radio").classList.add("checked");
      });
      // Slider
      const slider=document.getElementById("ux-ob-slider");
      const out=document.getElementById("ux-ob-min");
      slider.addEventListener("input",e=>{
        self._state.dailyGoalMin = parseInt(e.target.value);
        out.textContent = e.target.value;
      });
      // Buttons
      document.getElementById("ux-ob-next").addEventListener("click",()=>self._next());
      document.getElementById("ux-ob-back").addEventListener("click",()=>self._prev());
      document.getElementById("ux-ob-skip").addEventListener("click",()=>self._finish(true));
    },
    _next(){
      if(this._state.step < 3){
        this._state.step++;
        this._renderStep();
      } else {
        this._finish(false);
      }
    },
    _prev(){
      if(this._state.step > 1){ this._state.step--; this._renderStep(); }
    },
    _renderStep(){
      const s=this._state.step;
      document.querySelectorAll("[data-step-content]").forEach(el=>{
        el.hidden = parseInt(el.dataset.stepContent) !== s;
      });
      document.querySelectorAll(".ux-step-pill").forEach(p=>{
        const n=parseInt(p.dataset.step);
        p.classList.toggle("active", n===s);
        p.classList.toggle("done", n<s);
      });
      document.getElementById("ux-ob-back").hidden = s===1;
      const next=document.getElementById("ux-ob-next");
      next.textContent = s===3 ? "Rozpocznij diagnozę" : "Dalej →";
    },
    _finish(skipped){
      window.state.profile = {
        goal: skipped ? null : this._state.goal,
        dailyGoalMin: skipped ? null : this._state.dailyGoalMin,
        onboardedAt: Date.now(),
        skipped: !!skipped
      };
      if(typeof window.saveState==="function") window.saveState();
      this.close();
      // Hook: jeśli user dotarł do step 3 — odpal diagnozę
      if(!skipped && typeof window.startDiagnostic === "function"){
        setTimeout(()=>window.startDiagnostic(),250);
      } else if(typeof window.render==="function"){
        setTimeout(()=>window.render("dash"),250);
      }
    }
  };
})();
</script>

<style id="ux-streak-css">
.ux-streak{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:99px;
  background:linear-gradient(135deg,#fff7ed,#fed7aa);
  border:1px solid #fdba74;color:#9a3412;
  font-weight:700;font-size:13px;cursor:pointer;
  position:relative;user-select:none;
  transition:transform .15s cubic-bezier(.2,.8,.2,1);
  min-height:32px;
}
.ux-streak:hover{transform:translateY(-1px)}
.ux-streak.cold{
  background:#f1f4f9;border-color:var(--border);color:var(--muted);
}
.ux-streak .ux-fire{font-size:16px;line-height:1}
.ux-streak.bumped .ux-fire{animation:ux-fire-bump .6s cubic-bezier(.2,.8,.2,1)}
@keyframes ux-fire-bump{
  0%{transform:scale(1)}
  30%{transform:scale(1.4) rotate(-8deg)}
  60%{transform:scale(1.15) rotate(6deg)}
  100%{transform:scale(1)}
}
.ux-streak-tip{
  position:absolute;top:calc(100% + 8px);right:0;
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:14px;box-shadow:var(--shadow);min-width:240px;z-index:200;
  font-weight:400;color:var(--text);font-size:13px;
  opacity:0;pointer-events:none;transform:translateY(-4px);
  transition:opacity .2s,transform .2s;
}
.ux-streak-tip.open{opacity:1;pointer-events:auto;transform:translateY(0)}
.ux-streak-tip h4{margin:0 0 6px;font-size:13px;color:var(--accent2)}
.ux-streak-tip p{margin:0 0 10px;color:var(--muted);font-size:12px}
.ux-streak-tip .btn{font-size:12px;padding:6px 10px;min-height:36px;width:100%;justify-content:center}
.ux-streak-nav-wrap{padding:0 16px 8px}
@media(max-width:780px){
  .ux-streak-tip{right:auto;left:0}
}
</style>

<script id="ux-streak-js">
(function(){
  const M = (window.UX = window.UX || {});
  function todayKey(d=new Date()){
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  }
  function yesterdayKey(){
    const d=new Date(); d.setDate(d.getDate()-1); return todayKey(d);
  }

  M.streak = {
    /** Inicjalizacja struktury w state. Idempotentne. */
    ensure(){
      if(!window.state) return;
      if(!window.state.streak){
        window.state.streak = {count:0,lastActiveDate:null,freezesAvailable:3};
      }
    },
    /**
     * Wywołać po KAŻDEJ aktywności (odpowiedź quiz/SRS/diagnostyka).
     * Zwraca obiekt {bumped:bool, count:number, milestone:7|30|null}.
     */
    markActivity(){
      this.ensure();
      const s=window.state.streak;
      const today=todayKey();
      let result={bumped:false,count:s.count,milestone:null};
      if(s.lastActiveDate === today){
        // już aktywny — noop
        return result;
      }
      if(s.lastActiveDate === yesterdayKey()){
        s.count += 1;
        result.bumped=true;
      } else if(s.lastActiveDate === null){
        s.count = 1;
        result.bumped=true;
      } else {
        // przerwa — sprawdź freeze (auto-uzycie)
        if(s.freezesAvailable > 0){
          // Symulujemy freeze za każdy brakujący dzień (max 1 dzień luki = 1 freeze)
          s.freezesAvailable -= 1;
          s.count += 1;
          result.bumped=true;
        } else {
          s.count = 1;
          result.bumped=true;
        }
      }
      s.lastActiveDate = today;
      result.count = s.count;
      if(s.count===7) result.milestone=7;
      if(s.count===30) result.milestone=30;
      if(typeof window.saveState==="function") window.saveState();
      this.renderInNav();
      // Hook do achievements + confetti
      if(result.milestone && M.achievements){
        if(result.milestone===7) M.achievements.unlock("streak_7");
        if(result.milestone===30) M.achievements.unlock("streak_30");
        if(M.fx && M.fx.confetti) M.fx.confetti();
      }
      return result;
    },
    useFreeze(){
      this.ensure();
      const s=window.state.streak;
      if(s.freezesAvailable<=0) return false;
      s.freezesAvailable--;
      // Odśwież lastActiveDate na dziś jako "zamrożone"
      s.lastActiveDate = todayKey();
      if(typeof window.saveState==="function") window.saveState();
      this.renderInNav();
      return true;
    },
    /** Wstrzyknij badge w <nav>. Idempotentne. */
    renderInNav(){
      this.ensure();
      const nav=document.querySelector("nav");
      if(!nav) return;
      let wrap=document.getElementById("ux-streak-nav-wrap");
      if(!wrap){
        wrap=document.createElement("div");
        wrap.className="ux-streak-nav-wrap";
        wrap.id="ux-streak-nav-wrap";
        // Wstaw zaraz po <h1>
        const h1=nav.querySelector("h1");
        if(h1) h1.after(wrap); else nav.prepend(wrap);
      }
      const s=window.state.streak;
      const cold = s.count===0 || (s.lastActiveDate!==todayKey() && s.lastActiveDate!==yesterdayKey());
      wrap.innerHTML = `
        <button class="ux-streak ${cold?'cold':''}" id="ux-streak-btn" aria-label="Codzienna seria: ${s.count} dni">
          <span class="ux-fire">${cold?'❄️':'🔥'}</span>
          <span>${s.count}</span>
        </button>
        <div class="ux-streak-tip" id="ux-streak-tip" role="tooltip">
          <h4>Codzienna seria · ${s.count} ${s.count===1?'dzień':'dni'}</h4>
          <p>Nie zrywaj łańcucha! Wystarczy 1 odpowiedź dziennie.<br>
          Zamrożenia: <b>${s.freezesAvailable}</b> dostępne</p>
          <button class="btn ghost" id="ux-streak-freeze" ${s.freezesAvailable<=0?'disabled':''}>
            ❄️ Użyj zamrożenia (${s.freezesAvailable})
          </button>
        </div>
      `;
      const btn=document.getElementById("ux-streak-btn");
      const tip=document.getElementById("ux-streak-tip");
      btn.addEventListener("click",e=>{
        e.stopPropagation();
        tip.classList.toggle("open");
      });
      document.getElementById("ux-streak-freeze").addEventListener("click",e=>{
        e.stopPropagation();
        if(M.streak.useFreeze()){
          tip.classList.remove("open");
        }
      });
      document.addEventListener("click",e=>{
        if(!wrap.contains(e.target)) tip.classList.remove("open");
      });
    },
    /** Test helper — wymusza animację ognia */
    bump(){
      const btn=document.getElementById("ux-streak-btn");
      if(!btn) return;
      btn.classList.remove("bumped");
      void btn.offsetWidth;
      btn.classList.add("bumped");
    }
  };
})();
</script>

<script id="ux-ach-js">
(function(){
  const M = (window.UX = window.UX || {});

  const CATALOG = {
    first_quiz:           {ico:"🎯",name:"Pierwszy quiz",desc:"Ukończ pierwszy quiz"},
    streak_7:             {ico:"🔥",name:"Tydzień ognia",desc:"7 dni z rzędu"},
    streak_30:            {ico:"💎",name:"Diament",desc:"30 dni z rzędu"},
    area_mastered_B:      {ico:"🖥️",name:"Mistrz Budowy",desc:"100% w obszarze B"},
    area_mastered_O:      {ico:"⚙️",name:"Mistrz OS",desc:"100% w obszarze O"},
    area_mastered_N:      {ico:"🌐",name:"Mistrz Sieci",desc:"100% w obszarze N"},
    area_mastered_P:      {ico:"🔌",name:"Mistrz Peryferii",desc:"100% w obszarze P"},
    area_mastered_D:      {ico:"🔧",name:"Mistrz Diagnostyki",desc:"100% w obszarze D"},
    quiz_perfect_40:      {ico:"💯",name:"Perfekcja",desc:"40/40 w pełnym quizie"},
    quiz_passed_first_try:{ico:"🚀",name:"Za pierwszym razem",desc:"≥50% przy 1. próbie"},
    subnetting_master:    {ico:"📡",name:"Subnetting Master",desc:"10 podsieci poprawnie"},
    "100_questions_done": {ico:"🏆",name:"Setka",desc:"100 pytań rozwiązanych"}
  };

  M.achievements = {
    catalog: CATALOG,
    ensure(){
      if(!window.state) return;
      if(!window.state.achievements){
        window.state.achievements = {}; // id -> {unlockedAt}
      }
    },
    isUnlocked(id){
      this.ensure();
      return !!window.state.achievements[id];
    },
    /**
     * Odblokuj achievement. Zwraca true tylko jeśli to nowe odblokowanie.
     */
    unlock(id){
      this.ensure();
      if(!CATALOG[id]) { console.warn("Unknown achievement",id); return false; }
      if(window.state.achievements[id]) return false;
      window.state.achievements[id] = {unlockedAt: Date.now()};
      if(typeof window.saveState==="function") window.saveState();
      this.toast(id);
      // Confetti hook
      if(M.fx && M.fx.confetti) M.fx.confetti();
      return true;
    },
    toast(id){
      const a = CATALOG[id]; if(!a) return;
      let stack=document.getElementById("ux-toast-stack");
      if(!stack){
        stack=document.createElement("div");
        stack.id="ux-toast-stack";
        stack.className="ux-toast-stack";
        document.body.appendChild(stack);
      }
      const el=document.createElement("div");
      el.className="ux-toast";
      el.innerHTML=`
        <div class="ux-toast-head">
          <span class="ux-toast-ico">🏆</span>
          <span class="ux-toast-title">Odblokowane: ${a.name}</span>
        </div>
        <div class="ux-toast-sub">${a.ico} ${a.desc}</div>
        <div class="ux-toast-bar"><span></span></div>
      `;
      stack.appendChild(el);
      setTimeout(()=>{
        el.classList.add("out");
        setTimeout(()=>el.remove(),250);
      },4000);
    },
    /**
     * Sprawdź wszystkie warunki na podstawie state. Wywoływać po istotnych akcjach.
     */
    checkAll(){
      if(!window.state) return;
      const st=window.state;
      const ans=Object.values(st.answered||{});
      // first_quiz / 100_questions_done
      if((st.stats?.quizzes||[]).length>=1) this.unlock("first_quiz");
      if(ans.length>=100) this.unlock("100_questions_done");
      // streaks
      if(st.streak?.count>=7) this.unlock("streak_7");
      if(st.streak?.count>=30) this.unlock("streak_30");
      // area mastery — wymaga window.QUESTIONS i window.AREAS
      if(window.QUESTIONS){
        ["B","O","N","P","D"].forEach(area=>{
          const inArea=window.QUESTIONS.filter(q=>q.a===area);
          if(!inArea.length) return;
          const ok=inArea.every(q=>st.answered?.[q.id]?.correct);
          if(ok) this.unlock("area_mastered_"+area);
        });
      }
      // quiz perfect / first try
      (st.stats?.quizzes||[]).forEach(q=>{
        if(q.total===40 && q.score===40) this.unlock("quiz_perfect_40");
      });
      const firstQuiz=(st.stats?.quizzes||[])[0];
      if(firstQuiz && (firstQuiz.score/firstQuiz.total) >= 0.5){
        this.unlock("quiz_passed_first_try");
      }
      // subnetting_master — z osobnego countera
      if((st.subnettingOk||0)>=10) this.unlock("subnetting_master");
    },
    /** Renderuje siatkę 4×3 — np. w view 'achievements' lub w settings. */
    renderGrid(targetEl){
      this.ensure();
      const st=window.state.achievements||{};
      const html=Object.entries(CATALOG).map(([id,a])=>{
        const u=!!st[id];
        return `
          <div class="ux-ach-card ${u?'unlocked':'locked'}" title="${a.desc}">
            <div class="ux-ach-ico">${a.ico}</div>
            <div class="ux-ach-name">${a.name}</div>
            <div class="ux-ach-desc">${a.desc}</div>
          </div>
        `;
      }).join("");
      targetEl.innerHTML = `<div class="ux-ach-grid">${html}</div>`;
    },
    /** Liczba odblokowanych / total — przydatne do nagłówka. */
    progress(){
      this.ensure();
      const total=Object.keys(CATALOG).length;
      const done=Object.keys(window.state.achievements||{}).length;
      return {done,total};
    }
  };
})();
</script>

<script id="ux-fx-js">
(function(){
  const M = (window.UX = window.UX || {});
  const easeOutCubic = t => 1 - Math.pow(1-t, 3);

  M.fx = {
    /**
     * Confetti — czysty Canvas API. 50 cząsteczek, gravity, fadeout 2.5s.
     * Kolory z CSS variables (accent + good).
     */
    confetti(opts={}){
      const N = opts.count || 50;
      const canvas = this._ensureCanvas();
      const ctx = canvas.getContext("2d");
      // Kolory z CSS (z fallbackiem)
      const css = getComputedStyle(document.documentElement);
      const accent = css.getPropertyValue("--accent").trim() || "#2f6ef0";
      const good   = css.getPropertyValue("--good").trim()   || "#1f9d55";
      const colors = [accent, good, "#fbbf24", "#ec4899", "#8b5cf6"];
      const W=canvas.width, H=canvas.height;
      const cx = opts.x ?? W/2, cy = opts.y ?? H/3;
      const parts = [];
      for(let i=0;i<N;i++){
        const ang = Math.random()*Math.PI*2;
        const speed = 4 + Math.random()*6;
        parts.push({
          x:cx, y:cy,
          vx:Math.cos(ang)*speed,
          vy:Math.sin(ang)*speed - 4,
          size: 4+Math.random()*4,
          color: colors[(Math.random()*colors.length)|0],
          rot: Math.random()*Math.PI,
          vr: (Math.random()-.5)*.3,
          life: 0
        });
      }
      const DURATION = 2500;
      const t0 = performance.now();
      const tick = (t)=>{
        const dt = t - t0;
        ctx.clearRect(0,0,W,H);
        let alive=0;
        parts.forEach(p=>{
          p.vy += 0.22; // gravity
          p.vx *= 0.99;
          p.x += p.vx; p.y += p.vy;
          p.rot += p.vr;
          p.life = dt/DURATION;
          if(p.life < 1){
            alive++;
            ctx.save();
            ctx.globalAlpha = Math.max(0, 1 - p.life);
            ctx.translate(p.x,p.y);
            ctx.rotate(p.rot);
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
            ctx.restore();
          }
        });
        if(alive>0 && dt<DURATION){ requestAnimationFrame(tick); }
        else { ctx.clearRect(0,0,W,H); }
      };
      requestAnimationFrame(tick);
    },
    _ensureCanvas(){
      let c=document.getElementById("ux-confetti-canvas");
      if(!c){
        c=document.createElement("canvas");
        c.id="ux-confetti-canvas";
        document.body.appendChild(c);
      }
      const dpr=window.devicePixelRatio||1;
      c.width = window.innerWidth*dpr;
      c.height = window.innerHeight*dpr;
      c.style.width = window.innerWidth+"px";
      c.style.height = window.innerHeight+"px";
      c.getContext("2d").scale(dpr,dpr);
      // override po scale: width/height już ustawione, kontekst po scale liczy w CSS px
      c.width = window.innerWidth;
      c.height = window.innerHeight;
      return c;
    },

    /**
     * Animowany count-up. Element musi mieć tekst startowy (np. "0%").
     * fx.countUp(el, {from:0, to:75, suffix:"%", duration:1200})
     */
    countUp(el, {from=0,to=100,suffix="",duration=1200,prefix=""}={}){
      if(!el) return;
      const t0=performance.now();
      const tick=(t)=>{
        const p=Math.min(1,(t-t0)/duration);
        const v=from + (to-from)*easeOutCubic(p);
        el.textContent = prefix + Math.round(v) + suffix;
        if(p<1) requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    },

    /** Haptic feedback — silently skipped jeśli brak supportu. */
    hapticGood(){
      try{ navigator.vibrate && navigator.vibrate(20); }catch(e){}
    },
    hapticBad(){
      try{ navigator.vibrate && navigator.vibrate([40,30,40]); }catch(e){}
    },

    /** Mikroshake na DOM elemencie — bez side effectu po zakończeniu. */
    shake(el){
      if(!el) return;
      el.classList.remove("ux-shake");
      void el.offsetWidth; // reflow dla restartu animacji
      el.classList.add("ux-shake");
      setTimeout(()=>el.classList.remove("ux-shake"),350);
    },
    pulseGood(el){
      if(!el) return;
      el.classList.remove("ux-pulse-good");
      void el.offsetWidth;
      el.classList.add("ux-pulse-good");
      setTimeout(()=>el.classList.remove("ux-pulse-good"),650);
    },

    /**
     * Sugar: feedback po odpowiedzi. Wywołać z selectAnswer/srsAnswer.
     * fx.answerFeedback(optEl, correct)
     */
    answerFeedback(el, correct){
      if(correct){ this.hapticGood(); this.pulseGood(el); }
      else       { this.hapticBad();  this.shake(el);    }
    }
  };

  // Resize canvas — gdy istnieje
  window.addEventListener("resize",()=>{
    const c=document.getElementById("ux-confetti-canvas");
    if(c){ c.width=window.innerWidth; c.height=window.innerHeight; }
  });
})();
</script>
